                        {dayJobs.map(job => {
                          const fc = getForemanColor(job.foreman);
                          const sc = STATUS_COLORS[job.status] || STATUS_COLORS["Scheduled"];
                          const prog = calcJobProgress(job);
                          const totalFt = getTotalFootage(job);
                          return (
                            <div key={job.id} onClick={() => setSelectedJob(job)}
                              style={{ background: fc.bg, border: `1px solid ${fc.border}`,
                                borderLeft: `3px solid ${sc.border}`,
                                borderRadius: 4, padding: "6px 8px", cursor: "pointer",
                                opacity: job.status === "Cancelled" ? 0.4 : 1 }}>
                              <div style={{ fontSize: 12, fontWeight: 700, color: fc.text, letterSpacing: 0.5, marginBottom: 2,
                                whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                                {job.jobName}
                              </div>
                              {job.client && <div style={{ fontSize: 10, color: "#4a6fa5" }}>{job.client}</div>}
                              {job.foreman && <div style={{ fontSize: 10, color: fc.text, opacity: 0.7 }}>{job.foreman}</div>}
                              {totalFt > 0 && <div style={{ fontSize: 10, color: "#ffd166", fontFamily: "'Share Tech Mono', monospace", marginTop: 2 }}>{totalFt.toLocaleString()} ft</div>}
                              {/* Mini drill/pull bars */}
                              {(prog.drillPct > 0 || prog.pullPct > 0) && (
                                <div style={{ marginTop: 4 }}>
                                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#4a6fa5", marginBottom: 2 }}>
                                    <span>⛏{prog.drillPct}%</span><span>🔧{prog.pullPct}%</span>
                                  </div>
                                  <div style={{ background: "#1a2840", borderRadius: 2, height: 3, marginBottom: 2 }}>
                                    <div style={{ width: prog.drillPct + "%", height: "100%", background: prog.drillPct >= 100 ? "#2dbd4e" : "#2d7dd2", borderRadius: 2 }} />
                                  </div>
                                  <div style={{ background: "#2a1a00", borderRadius: 2, height: 3 }}>
                                    <div style={{ width: prog.pullPct + "%", height: "100%", background: prog.pullPct >= 100 ? "#2dbd4e" : "#e6a817", borderRadius: 2 }} />
                                  </div>
                                </div>
                              )}
                              <div style={{ marginTop: 4 }}>
                                <span style={{ fontSize: 9, background: sc.bg, border: `1px solid ${sc.border}`, color: sc.text,
                                  padding: "1px 5px", borderRadius: 2, letterSpacing: 0.5 }}>
                                  {job.status.toUpperCase()}
                                </span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Legend */}
            <div style={{ display: "flex", gap: 16, marginTop: 16, flexWrap: "wrap", alignItems: "center" }}>
              <span style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2 }}>FOREMAN:</span>
              {FOREMEN.map(f => {
                const fc = getForemanColor(f);
                return (
                  <div key={f} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                    <div style={{ width: 12, height: 12, borderRadius: 2, background: fc.bg, border: `1px solid ${fc.border}` }} />
                    <span style={{ fontSize: 11, color: fc.text, letterSpacing: 0.5 }}>{f}</span>
                  </div>
                );
              })}
              <span style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2, marginLeft: 8 }}>STATUS:</span>
              {Object.entries(STATUS_COLORS).map(([s, c]) => (
                <div key={s} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <div style={{ width: 8, height: 8, borderRadius: 1, background: c.border }} />
                  <span style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 1 }}>{s}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── LIST VIEW ── */}
        {view === "list" && (
          <div className="slide-in">
            <div style={{ marginBottom: 16, fontSize: 14, color: "#4a6fa5", letterSpacing: 2 }}>ALL JOBS — {jobs.length} TOTAL</div>
            {jobs.length === 0 && (
              <div style={{ textAlign: "center", padding: 60, color: "#2a3548", fontSize: 18, letterSpacing: 2 }}>NO JOBS SCHEDULED</div>
            )}
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {jobs.sort((a, b) => (a.startDate > b.startDate ? 1 : -1)).map(job => {
                const c = STATUS_COLORS[job.status] || STATUS_COLORS["Scheduled"];
                const fc = getForemanColor(job.foreman);
                const revenue = getTotalRevenue(job);
                const totalFt = getTotalFootage(job);
                const segments = job.segments || (job.footage ? [{ id: "legacy", pipeSize: job.pipeSize, pipeSpec: job.pipeSpec, footage: job.footage, pricePerFoot: job.pricePerFoot }] : []);
                return (
                  <div key={job.id} onClick={() => setSelectedJob(job)}
                    style={{ background: "#0f1520", border: `1px solid ${c.border}`, borderLeft: `4px solid ${fc.border}`,
                      borderRadius: 6, padding: "14px 18px", cursor: "pointer", display: "flex", gap: 16, alignItems: "center",
                      flexWrap: "wrap" }}>
                    <div style={{ flex: "0 0 200px" }}>
                      <div style={{ fontWeight: 700, fontSize: 16, color: "#fff", letterSpacing: 1 }}>{job.jobName}</div>
                      <div style={{ fontSize: 12, color: "#4a6fa5" }}>{job.client}</div>
                      {job.foreman && <div style={{ fontSize: 11, color: fc.text, marginTop: 2 }}>{job.foreman}</div>}
                    </div>
                    <div style={{ flex: "0 0 160px", fontSize: 12, fontFamily: "'Share Tech Mono', monospace" }}>
                      <div style={{ color: "#7ec8f7" }}>{job.startDate} →</div>
                      <div style={{ color: "#7ec8f7" }}>{job.endDate}</div>
                    </div>
                    {/* Segments summary */}
                    <div style={{ flex: "1 1 200px", minWidth: 160 }}>
                      {segments.filter(s => s.footage).map((seg, idx) => (
                        <div key={seg.id || idx} style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 3 }}>
                          <span style={{ fontSize: 11, color: "#ffd166", fontFamily: "'Share Tech Mono', monospace", fontWeight: 700 }}>{Number(seg.footage).toLocaleString()} ft</span>
                          {seg.pipeSize && <span style={{ fontSize: 10, color: "#7affa0" }}>{seg.pipeSize}</span>}
                          {seg.pipeSpec && <span style={{ fontSize: 10, color: "#b0c0d4" }}>{seg.pipeSpec}</span>}
                          {seg.pricePerFoot && <span style={{ fontSize: 10, color: "#4a6fa5" }}>${parseFloat(seg.pricePerFoot).toFixed(2)}/ft</span>}
                        </div>
                      ))}
                      {segments.filter(s => s.footage).length > 1 && (
                        <div style={{ fontSize: 10, color: "#4a6fa5", marginTop: 2 }}>Total: {totalFt.toLocaleString()} ft</div>
                      )}
                    </div>
                    <div style={{ flex: "0 0 100px", textAlign: "center" }}>
                      <div style={{ fontSize: 16, fontWeight: 700, color: "#d0d8e4" }}>{revenue > 0 ? "$" + revenue.toLocaleString(undefined, { maximumFractionDigits: 0 }) : "—"}</div>
                      <div style={{ fontSize: 11, color: "#4a6fa5" }}>REVENUE</div>
                    </div>
                    <div style={{ flex: "0 0 100px", textAlign: "center" }}>
                      <div style={{ display: "inline-block", background: c.bg, border: `1px solid ${c.border}`,
                        borderRadius: 3, padding: "3px 10px", fontSize: 11, color: c.text, letterSpacing: 1 }}>
                        {job.status.toUpperCase()}
                      </div>
                    </div>
                    {/* Drill + Pull Progress */}
                    {(() => {
                      const prog = calcJobProgress(job);
                      const hasDrill = prog.drillPct > 0;
                      const hasPull = prog.pullPct > 0;
                      if (!hasDrill && !hasPull) return (
                        <div style={{ marginLeft: "auto", display: "flex", gap: 8, alignItems: "center" }}>
                          <button className="btn" onClick={e => { e.stopPropagation(); openProgress(job); }}
                            style={{ background: "#1a3a1a", border: "1px solid #2dbd4e", color: "#7affa0", padding: "6px 14px", fontSize: 12 }}>+ LOG</button>
                          <button className="btn" onClick={e => { e.stopPropagation(); openEdit(job); }}
                            style={{ background: "#131820", border: "1px solid #2a3548", color: "#7ec8f7", padding: "6px 14px", fontSize: 12 }}>EDIT</button>
                        </div>
                      );
                      return (
                        <div style={{ marginLeft: "auto", display: "flex", gap: 16, alignItems: "center" }}>
                          {/* Services progress — count based */}
                          <div style={{ width: 130 }}>
                            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                              <span style={{ fontSize: 10, color: "#a78bfa", letterSpacing: 1 }}>SERVICES</span>
                              <span style={{ fontSize: 10, fontWeight: 700, color: prog.servicesPct >= 100 ? "#7affa0" : "#a78bfa", fontFamily: "'Share Tech Mono', monospace" }}>{prog.servicesDoneCount}/{prog.servicesTotalCount} · {prog.servicesPct}%</span>
                            </div>
                            <div style={{ background: "#0d1117", borderRadius: 3, height: 7, border: "1px solid #1a2840" }}>
                              <div style={{ width: prog.servicesPct + "%", height: "100%", background: prog.servicesPct >= 100 ? "#2dbd4e" : "#a78bfa", borderRadius: 3, transition: "width .3s" }} />
                            </div>
                            <div style={{ fontSize: 9, color: "#a78bfa", marginTop: 2, fontFamily: "'Share Tech Mono', monospace" }}>
                              {prog.servicesDoneCount} of {prog.servicesTotalCount} svcs
                            </div>
                          </div>
                          {/* Mainline pull progress */}
                          <div style={{ width: 110 }}>
                            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                              <span style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 1 }}>MAINLINE</span>
                              <span style={{ fontSize: 10, fontWeight: 700, color: prog.mainlinePullPct >= 100 ? "#7affa0" : "#f59e0b", fontFamily: "'Share Tech Mono', monospace" }}>{prog.mainlinePullPct}%</span>
                            </div>
                            <div style={{ background: "#0d1117", borderRadius: 3, height: 7, border: "1px solid #1a2840" }}>
                              <div style={{ width: prog.mainlinePullPct + "%", height: "100%", background: prog.mainlinePullPct >= 100 ? "#2dbd4e" : "#f59e0b", borderRadius: 3, transition: "width .3s" }} />
                            </div>
                            <div style={{ fontSize: 9, color: "#4a6fa5", marginTop: 2, fontFamily: "'Share Tech Mono', monospace" }}>
                              {Number(prog.mainlinePullDone || 0).toLocaleString()} / {Number(prog.mainlineTotalFt || totalFt).toLocaleString()} ft
                            </div>
                          </div>
                          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                            <button className="btn" onClick={e => { e.stopPropagation(); openProgress(job); }}
                              style={{ background: "#1a3a1a", border: "1px solid #2dbd4e", color: "#7affa0", padding: "6px 14px", fontSize: 12 }}>+ LOG</button>
                            <button className="btn" onClick={e => { e.stopPropagation(); openEdit(job); }}
                              style={{ background: "#131820", border: "1px solid #2a3548", color: "#7ec8f7", padding: "6px 14px", fontSize: 12 }}>EDIT</button>
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* ── JOB DETAIL MODAL ── */}
      {selectedJob && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.75)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" }}
          onClick={() => setSelectedJob(null)}>
          <div className="slide-in" onClick={e => e.stopPropagation()}
            style={{ background: "#0f1520", border: "1px solid #2a3548", borderRadius: 8, padding: 28, width: 480, maxWidth: "95vw" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
              <div>
                <div style={{ fontSize: 22, fontWeight: 700, color: "#fff", letterSpacing: 1 }}>{selectedJob.jobName}</div>
                <div style={{ fontSize: 13, color: "#4a6fa5" }}>{selectedJob.client} · {selectedJob.location}{selectedJob.foreman ? " · " + selectedJob.foreman : ""}</div>
              </div>
              <button className="btn" onClick={() => setSelectedJob(null)}
                style={{ background: "transparent", color: "#4a6fa5", fontSize: 20, padding: "0 6px" }}>✕</button>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 20 }}>
              {[
                ["BID DATE", selectedJob.bidDate || "—"],
                ["START DATE", selectedJob.startDate],
                ["END DATE", selectedJob.endDate],
                ["DURATION", selectedJob.duration ? selectedJob.duration + " days" : "—"],
                ["TOTAL FOOTAGE", (() => { const ft = getTotalFootage(selectedJob); return ft > 0 ? ft.toLocaleString() + " ft" : "—"; })()],
                ["FOREMAN", selectedJob.foreman || "—"],
                ["STATUS", selectedJob.status],
                ["TOTAL REVENUE", (() => { const r = getTotalRevenue(selectedJob); return r > 0 ? "$" + r.toLocaleString(undefined, { maximumFractionDigits: 0 }) : "—"; })()],
              ].map(([label, val]) => (
                <div key={label} style={{ background: "#0d1117", borderRadius: 4, padding: "10px 14px" }}>
                  <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2, marginBottom: 4 }}>{label}</div>
                  <div style={{ fontSize: 15, fontWeight: 600, color: "#d0d8e4", fontFamily: "'Share Tech Mono', monospace" }}>{val}</div>
                </div>
              ))}
            </div>

            {/* Segments detail */}
            {(() => {
              const segs = selectedJob.segments || (selectedJob.footage ? [{ id: "legacy", pipeSize: selectedJob.pipeSize, pipeSpec: selectedJob.pipeSpec, footage: selectedJob.footage, pricePerFoot: selectedJob.pricePerFoot }] : []);
              return segs.length > 0 ? (
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2, marginBottom: 8 }}>PIPE SEGMENTS</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {segs.filter(s => s.footage).map((seg, idx) => {
                      const rev = (parseFloat(seg.footage)||0) * (parseFloat(seg.pricePerFoot)||0);
                      return (
                        <div key={seg.id || idx} style={{ background: "#0a0f18", border: "1px solid #1a2840", borderLeft: "3px solid #2d7dd2", borderRadius: 4, padding: "8px 14px", display: "flex", gap: 16, flexWrap: "wrap", alignItems: "center" }}>
                          <span style={{ fontSize: 11, color: "#4a6fa5", fontWeight: 700 }}>SEG {idx+1}</span>
                          <span style={{ fontSize: 13, color: "#ffd166", fontWeight: 700, fontFamily: "'Share Tech Mono', monospace" }}>{Number(seg.footage).toLocaleString()} ft</span>
                          {seg.pipeSize && <span style={{ fontSize: 12, color: "#7affa0" }}>{seg.pipeSize}</span>}
                          {seg.pipeSpec && <span style={{ fontSize: 12, color: "#b0c0d4" }}>{seg.pipeSpec}</span>}
                          {seg.pricePerFoot && <span style={{ fontSize: 12, color: "#4a6fa5" }}>${parseFloat(seg.pricePerFoot).toFixed(2)}/ft</span>}
                          {rev > 0 && <span style={{ fontSize: 12, color: "#7affa0", marginLeft: "auto" }}>${rev.toLocaleString(undefined, { maximumFractionDigits: 0 })}</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              ) : null;
            })()}

            {selectedJob.notes && (
              <div style={{ background: "#0d1117", borderRadius: 4, padding: "10px 14px", marginBottom: 20 }}>
                <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2, marginBottom: 4 }}>NOTES</div>
                <div style={{ fontSize: 13, color: "#d0d8e4" }}>{selectedJob.notes}</div>
              </div>
            )}

            {/* Services + Mainline progress in detail modal */}
            {(() => {
              const prog = calcJobProgress(selectedJob);
              const hasAny = prog.servicesPullDone > 0 || prog.mainlinePullDone > 0;
              return (
                <div style={{ marginBottom: 16 }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: hasAny && prog.remainingDays ? 8 : 0 }}>
                    {/* Services */}
                    <div style={{ background: "#0d1117", border: "1px solid #3a1a5c", borderRadius: 5, padding: "10px 12px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                        <span style={{ fontSize: 11, fontWeight: 700, color: "#c4b5fd", letterSpacing: 1 }}>🔌 SERVICES</span>
                        <span style={{ fontSize: 13, fontWeight: 700, color: prog.servicesPct >= 100 ? "#7affa0" : "#c4b5fd" }}>{prog.servicesPct}%</span>
                      </div>
                      <div style={{ background: "#1a0a2e", borderRadius: 3, height: 6, overflow: "hidden", marginBottom: 6 }}>
                        <div style={{ width: prog.servicesPct + "%", height: "100%", background: prog.servicesPct >= 100 ? "#2dbd4e" : "#a78bfa", borderRadius: 3, transition: "width .4s" }} />
                      </div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#c4b5fd", marginBottom: 2 }}>
                        {prog.servicesDoneCount} <span style={{ fontSize: 10, fontWeight: 400 }}>of</span> {prog.servicesTotalCount} <span style={{ fontSize: 10, fontWeight: 400 }}>completed</span>
                      </div>
                      {prog.servicesPct >= 100 && <div style={{ fontSize: 10, color: "#7affa0", marginTop: 3 }}>✓ COMPLETE</div>}
                    </div>
                    {/* Mainline */}
                    <div style={{ background: "#0d1117", border: "1px solid #3a2e0a", borderRadius: 5, padding: "10px 12px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                        <span style={{ fontSize: 11, fontWeight: 700, color: "#ffd166", letterSpacing: 1 }}>🔧 MAINLINE</span>
                        <span style={{ fontSize: 13, fontWeight: 700, color: prog.mainlinePullPct >= 100 ? "#7affa0" : "#ffd166" }}>{prog.mainlinePullPct}%</span>
                      </div>
                      <div style={{ background: "#2a1a00", borderRadius: 3, height: 6, overflow: "hidden", marginBottom: 6 }}>
                        <div style={{ width: prog.mainlinePullPct + "%", height: "100%", background: prog.mainlinePullPct >= 100 ? "#2dbd4e" : "#e6a817", borderRadius: 3, transition: "width .4s" }} />
                      </div>
                      <div style={{ fontSize: 10, color: "#ffd166" }}>{(prog.mainlinePullDone || 0).toLocaleString()} ft done</div>
                      <div style={{ fontSize: 10, color: "#4a6fa5" }}>{(prog.mainlineTotalFt || 0).toLocaleString()} ft total</div>
                      {prog.mainlinePullPct >= 100 && <div style={{ fontSize: 10, color: "#7affa0", marginTop: 3 }}>✓ COMPLETE</div>}
                    </div>
                  </div>
                  {prog.remainingDays && (
                    <div style={{ background: "#1a1200", border: "1px solid #e6a817", borderRadius: 4, padding: "8px 12px", fontSize: 11, color: "#ffd166" }}>
                      📅 Mainline: {(prog.mainlineTotalFt - prog.mainlinePullDone).toLocaleString()} ft left · {prog.pullAvgPerDay ? prog.pullAvgPerDay.toLocaleString() + " ft/day avg · " : ""}{prog.remainingDays} workdays · End: <strong>{prog.updatedEndDate}</strong>
                    </div>
                  )}
                </div>
              );
            })()}
            {/* Pause log summary */}
            {(selectedJob.pauseLog || []).length > 0 && (
              <div style={{ background: "#1a1200", border: "1px solid #e6a817", borderRadius: 4, padding: "10px 14px", marginBottom: 12 }}>
                <div style={{ fontSize: 10, color: "#e6a817", letterSpacing: 2, marginBottom: 6 }}>⏸ PAUSE HISTORY</div>
                {(selectedJob.pauseLog || []).map((p, i) => (
                  <div key={p.id} style={{ fontSize: 11, color: "#ffd166", marginBottom: 3, fontFamily: "'Share Tech Mono', monospace" }}>
                    {i + 1}. Paused {p.pauseDate}{p.resumeDate ? ` → Resumed ${p.resumeDate}` : " · STILL PAUSED"}
                  </div>
                ))}
                <div style={{ fontSize: 11, color: "#8899aa", marginTop: 4 }}>
                  Total paused: {calcPausedWorkdays(selectedJob.pauseLog)} workdays
                </div>
              </div>
            )}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <button className="btn" onClick={() => { setSelectedJob(null); openProgress(selectedJob); }}
                style={{ flex: 1, background: "#1a3a1a", border: "1px solid #2dbd4e", color: "#7affa0", padding: "10px", fontSize: 12, letterSpacing: 1 }}>
                + LOG FOOTAGE
              </button>
              {selectedJob.status === "On Hold" ? (
                <button className="btn" onClick={() => openPauseModal(selectedJob)}
                  style={{ flex: 1, background: "#1a3a1a", border: "1px solid #2dbd4e", color: "#7affa0", padding: "10px", fontSize: 12, letterSpacing: 1 }}>
                  ▶ RESUME JOB
                </button>
              ) : selectedJob.status !== "Completed" && selectedJob.status !== "Cancelled" ? (
                <button className="btn" onClick={() => openPauseModal(selectedJob)}
                  style={{ flex: 1, background: "#3a2e0a", border: "1px solid #e6a817", color: "#ffd166", padding: "10px", fontSize: 12, letterSpacing: 1 }}>
                  ⏸ PAUSE JOB
                </button>
              ) : null}
              <button className="btn" onClick={() => openEdit(selectedJob)}
                style={{ flex: 1, background: "#2d7dd2", color: "#fff", padding: "10px", fontSize: 12, letterSpacing: 1 }}>
                EDIT JOB
              </button>
              <button className="btn" onClick={() => deleteJob(selectedJob.id)}
                style={{ background: "#1a0a0a", border: "1px solid #c0392b", color: "#ff8a80", padding: "10px 14px", fontSize: 12 }}>
                DELETE
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── ADD/EDIT JOB MODAL ── */}
      {showModal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.8)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", overflowY: "auto" }}
          onClick={() => setShowModal(false)}>
          <div className="slide-in" onClick={e => e.stopPropagation()}
            style={{ background: "#0f1520", border: "1px solid #2a3548", borderRadius: 8, padding: 28, width: 580, maxWidth: "95vw", margin: "20px auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <div style={{ fontSize: 18, fontWeight: 700, letterSpacing: 2, color: "#fff" }}>
                {form.id ? "EDIT JOB" : "NEW JOB"}
              </div>
              <button className="btn" onClick={() => setShowModal(false)}
                style={{ background: "transparent", color: "#4a6fa5", fontSize: 20, padding: "0 6px" }}>✕</button>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
              {[
                { field: "jobName", label: "JOB NAME *", span: 2 },
                { field: "location", label: "LOCATION" },
              ].map(({ field, label, type = "text", span }) => (
                <div key={field} style={{ gridColumn: span ? "1 / -1" : undefined }}>
                  <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2, marginBottom: 5 }}>{label}</div>
                  <input type={type} value={form[field]} onChange={e => handleFormChange(field, e.target.value)}
                    style={{ background: "#0d1117" }} />
                </div>
              ))}

              {/* Client */}
              <div>
                <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2, marginBottom: 5 }}>CLIENT</div>
                <select value={form.client} onChange={e => handleFormChange("client", e.target.value)}
                  style={{ background: "#0d1117" }}>
                  <option value="">— Select Client —</option>
                  {CLIENT_OPTIONS.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>

              {/* Foreman */}
              <div style={{ gridColumn: "1 / -1" }}>
                <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2, marginBottom: 5 }}>FOREMAN</div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {FOREMEN.map(f => {
                    const fc = getForemanColor(f);
                    const selected = form.foreman === f;
                    return (
                      <button key={f} type="button" className="btn"
                        onClick={() => handleFormChange("foreman", selected ? "" : f)}
                        style={{
                          padding: "8px 16px", fontSize: 13, fontWeight: 700, letterSpacing: 1,
                          background: selected ? fc.bg : "#0a0f18",
                          border: `2px solid ${selected ? fc.border : "#2a3548"}`,
                          color: selected ? fc.text : "#4a6fa5",
                          transition: "all .15s"
                        }}>
                        {f}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Bid Submission Date */}
              <div>
                <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2, marginBottom: 5 }}>BID SUBMISSION DATE</div>
                <input type="date" value={form.bidDate || ""} onChange={e => handleFormChange("bidDate", e.target.value)}
                  style={{ background: "#0d1117" }} />
              </div>

              {/* Start Date + Duration → auto-calc End Date */}
              <div>
                <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2, marginBottom: 5 }}>START DATE *</div>
                <input type="date" value={form.startDate} onChange={e => handleFormChange("startDate", e.target.value)}
                  style={{ background: "#0d1117" }} />
              </div>
              <div>
                <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2, marginBottom: 5 }}>DURATION (workdays) *</div>
                <input type="number" min="1" value={form.duration} onChange={e => handleFormChange("duration", e.target.value)}
                  placeholder="e.g. 5" style={{ background: "#0d1117" }} />
              </div>
              <div style={{ gridColumn: "1 / -1" }}>
                <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2, marginBottom: 5 }}>
                  END DATE <span style={{ color: "#2d7dd2" }}>(auto-calculated — Mon–Fri only)</span>
                </div>
                <input type="date" value={form.endDate} readOnly
                  style={{ background: "#0a0f18", color: form.endDate ? "#7affa0" : "#4a6fa5", cursor: "not-allowed", borderColor: "#1a2840" }} />
              </div>

              {/* ── PIPE SEGMENTS ── */}
              <div style={{ gridColumn: "1 / -1" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2 }}>PIPE SEGMENTS</div>
                  <button type="button" className="btn"
                    onClick={() => handleFormChange("segments", [...(form.segments || []), defaultSegment()])}
                    style={{ background: "#1a2840", border: "1px solid #2d7dd2", color: "#7ec8f7", padding: "5px 12px", fontSize: 11, letterSpacing: 1 }}>
                    + ADD SEGMENT
                  </button>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {(form.segments || []).map((seg, idx) => {
                    const segRevenue = isServiceSeg(seg)
                      ? (parseInt(seg.serviceCount) || 0) * (parseFloat(seg.pricePerFoot) || 0)
                      : (parseFloat(seg.footage) || 0) * (parseFloat(seg.pricePerFoot) || 0);
                    return (
                      <div key={seg.id} style={{ background: "#0a0f18", border: "1px solid #2a3548", borderLeft: "3px solid #2d7dd2", borderRadius: 6, padding: 12 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                          <span style={{ fontSize: 11, color: "#7ec8f7", fontWeight: 700, letterSpacing: 1 }}>SEGMENT {idx + 1}</span>
                          {(form.segments || []).length > 1 && (
                            <button type="button" className="btn"
                              onClick={() => handleFormChange("segments", form.segments.filter((_, i) => i !== idx))}
                              style={{ background: "none", border: "none", color: "#ff8a80", fontSize: 14, padding: "0 4px" }}>✕</button>
                          )}
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                          <div style={{ gridColumn: "1 / -1" }}>
                            <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 1, marginBottom: 4 }}>SEGMENT TYPE</div>
                            <select value={seg.segType || "Mainline"}
                              onChange={e => handleFormChange("segments", form.segments.map((s, i) => i === idx ? { ...s, segType: e.target.value } : s))}
                              style={{ background: "#0d1117", color: seg.segType === "Long Side Service" || seg.segType === "Short Side Service" ? "#c4b5fd" : "#7ec8f7" }}>
                              {SEG_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                            </select>
                          </div>
                          <div>
                            <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 1, marginBottom: 4 }}>PIPE SIZE</div>
                            <select value={seg.pipeSize}
                              onChange={e => handleFormChange("segments", form.segments.map((s, i) => i === idx ? { ...s, pipeSize: e.target.value } : s))}
                              style={{ background: "#0d1117" }}>
                              <option value="">Select…</option>
                              {PIPE_SIZES.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                          </div>
                          <div>
                            <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 1, marginBottom: 4 }}>PIPE SPEC</div>
                            <select value={seg.pipeSpec}
                              onChange={e => handleFormChange("segments", form.segments.map((s, i) => i === idx ? { ...s, pipeSpec: e.target.value } : s))}
                              style={{ background: "#0d1117" }}>
                              <option value="">Select…</option>
                              {PIPE_SPECS.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                          </div>
                          {!isServiceSeg(seg) && (
                            <div>
                              <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 1, marginBottom: 4 }}>FOOTAGE (ft)</div>
                              <input type="number" min="0" value={seg.footage}
                                onChange={e => handleFormChange("segments", form.segments.map((s, i) => i === idx ? { ...s, footage: e.target.value } : s))}
                                placeholder="e.g. 500" style={{ background: "#0d1117" }} />
                            </div>
                          )}
                          <div>
                            <div style={{ fontSize: 10, color: isServiceSeg(seg) ? "#a78bfa" : "#4a6fa5", letterSpacing: 1, marginBottom: 4 }}>
                              {isServiceSeg(seg) ? "PRICE / SERVICE ($)" : "PRICE / FOOT ($)"}
                            </div>
                            <input type="number" min="0" step="0.01" value={seg.pricePerFoot}
                              onChange={e => handleFormChange("segments", form.segments.map((s, i) => i === idx ? { ...s, pricePerFoot: e.target.value } : s))}
                              placeholder="e.g. 45.00" style={{ background: "#0d1117", borderColor: isServiceSeg(seg) ? "#6d28d9" : undefined }} />
                          </div>
                          {isServiceSeg(seg) && (
                            <div>
                              <div style={{ fontSize: 10, color: "#a78bfa", letterSpacing: 1, marginBottom: 4 }}>TOTAL SERVICE COUNT</div>
                              <input type="number" min="0" value={seg.serviceCount || ""}
                                onChange={e => handleFormChange("segments", form.segments.map((s, i) => i === idx ? { ...s, serviceCount: e.target.value } : s))}
                                placeholder="e.g. 12" style={{ background: "#0d1117", borderColor: "#6d28d9" }} />
                            </div>
                          )}
                        </div>
                        {segRevenue > 0 && (
                          <div style={{ marginTop: 8, fontSize: 11, color: "#7affa0", textAlign: "right" }}>
                            Segment revenue: <strong>${segRevenue.toLocaleString(undefined, { maximumFractionDigits: 0 })}</strong>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
                {/* Total summary */}
                {(form.segments || []).length > 0 && (() => {
                  const totalFt = (form.segments || []).reduce((s, seg) => s + (parseFloat(seg.footage) || 0), 0);
                  const totalRev = (form.segments || []).reduce((s, seg) => s + (parseFloat(seg.footage) || 0) * (parseFloat(seg.pricePerFoot) || 0), 0);
                  return totalFt > 0 ? (
                    <div style={{ marginTop: 10, background: "#0d1b2a", border: "1px solid #2a3548", borderRadius: 4, padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontSize: 11, color: "#4a6fa5", letterSpacing: 2 }}>
                        TOTAL: <strong style={{ color: "#ffd166" }}>{totalFt.toLocaleString()} ft</strong> across {(form.segments||[]).filter(s=>s.footage).length} segment{(form.segments||[]).filter(s=>s.footage).length !== 1 ? "s" : ""}
                      </span>
                      {totalRev > 0 && <span style={{ fontSize: 16, fontWeight: 700, color: "#7affa0" }}>${totalRev.toLocaleString(undefined, { maximumFractionDigits: 0 })}</span>}
                    </div>
                  ) : null;
                })()}
              </div>

              <div>
                <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2, marginBottom: 5 }}>STATUS</div>
                <select value={form.status} onChange={e => handleFormChange("status", e.target.value)}>
                  {STATUS_OPTIONS.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>

              <div style={{ gridColumn: "1 / -1" }}>
                <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2, marginBottom: 5 }}>NOTES</div>
                <textarea value={form.notes} onChange={e => handleFormChange("notes", e.target.value)}
                  rows={3} style={{ background: "#0d1117", resize: "vertical" }} />
              </div>
            </div>

            <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
              <button className="btn" onClick={saveJob}
                style={{ flex: 1, background: "#2d7dd2", color: "#fff", padding: "12px", fontSize: 14, letterSpacing: 1 }}>
                {form.id ? "SAVE CHANGES" : "ADD JOB"}
              </button>
              {form.id && (
                <button className="btn" onClick={() => {
                  if (window.confirm(`Delete "${form.jobName}"? This cannot be undone.`)) {
                    deleteJob(form.id);
                    setShowModal(false);
                  }
                }}
                  style={{ background: "#2a0a0a", border: "1px solid #c0392b", color: "#ff8a80", padding: "12px 18px", fontSize: 14, letterSpacing: 1 }}>
                  🗑 DELETE
                </button>
              )}
              <button className="btn" onClick={() => setShowModal(false)}
                style={{ background: "#131820", border: "1px solid #2a3548", color: "#8899aa", padding: "12px 20px", fontSize: 14 }}>
                CANCEL
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── FOOTAGE LOG MODAL ── */}
      {showProgressModal && progressJob && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.85)", zIndex: 110, display: "flex", alignItems: "center", justifyContent: "center", overflowY: "auto" }}
          onClick={() => setShowProgressModal(false)}>
          <div className="slide-in" onClick={e => e.stopPropagation()}
            style={{ background: "#0f1520", border: "1px solid #2dbd4e", borderRadius: 8, padding: 28, width: 580, maxWidth: "95vw", margin: "20px auto" }}>

            {/* Header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
              <div>
                <div style={{ fontSize: 20, fontWeight: 700, color: "#fff", letterSpacing: 1 }}>{progressJob.jobName}</div>
                <div style={{ fontSize: 12, color: "#4a6fa5" }}>FOOTAGE PROGRESS LOG · {getTotalFootage(progressJob) > 0 ? getTotalFootage(progressJob).toLocaleString() + " ft total" : ""}</div>
              </div>
              <button className="btn" onClick={() => setShowProgressModal(false)}
                style={{ background: "transparent", color: "#4a6fa5", fontSize: 20, padding: "0 6px" }}>✕</button>
            </div>

            {/* Drill vs Pull progress cards */}
            {(() => {
              const prog = calcJobProgress(progressJob);
              const total = parseFloat(progressJob.footage) || 0;
              return (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
                  {/* DRILL card */}
                  <div style={{ background: "#0d1117", border: "1px solid #1a3a5c", borderRadius: 6, padding: 14 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: "#7ec8f7", letterSpacing: 2 }}>⛏ DRILL</span>
                      <span style={{ fontSize: 18, fontWeight: 700, color: prog.drillPct >= 100 ? "#7affa0" : "#7ec8f7" }}>{prog.drillPct}%</span>
                    </div>
                    <div style={{ background: "#1a2840", borderRadius: 3, height: 8, overflow: "hidden", marginBottom: 10 }}>
                      <div style={{ width: prog.drillPct + "%", height: "100%", background: prog.drillPct >= 100 ? "#2dbd4e" : "#2d7dd2", borderRadius: 3, transition: "width .4s" }} />
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11 }}>
                      <span style={{ color: "#7ec8f7" }}>{prog.drillDone.toLocaleString()} ft done</span>
                      <span style={{ color: "#ffd166" }}>{prog.drillRemaining.toLocaleString()} ft left</span>
                    </div>
                    {prog.drillPct >= 100 && <div style={{ marginTop: 6, fontSize: 10, color: "#7affa0", letterSpacing: 1 }}>✓ DRILL COMPLETE</div>}
                  </div>

                  {/* PULL card */}
                  <div style={{ background: "#0d1117", border: "1px solid #3a2e0a", borderRadius: 6, padding: 14 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: "#ffd166", letterSpacing: 2 }}>🔧 PULL</span>
                      <span style={{ fontSize: 18, fontWeight: 700, color: prog.pullPct >= 100 ? "#7affa0" : "#ffd166" }}>{prog.pullPct}%</span>
                    </div>
                    <div style={{ background: "#2a1a00", borderRadius: 3, height: 8, overflow: "hidden", marginBottom: 10 }}>
                      <div style={{ width: prog.pullPct + "%", height: "100%", background: prog.pullPct >= 100 ? "#2dbd4e" : "#e6a817", borderRadius: 3, transition: "width .4s" }} />
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11 }}>
                      <span style={{ color: "#ffd166" }}>{prog.pullDone.toLocaleString()} ft done</span>
                      <span style={{ color: "#ff8a80" }}>{prog.pullRemaining.toLocaleString()} ft left</span>
                    </div>
                    {prog.pullPct >= 100 && <div style={{ marginTop: 6, fontSize: 10, color: "#7affa0", letterSpacing: 1 }}>✓ PULL COMPLETE</div>}
                  </div>

                  {/* Projection row */}
                  {prog.remainingDays && (
                    <div style={{ gridColumn: "1 / -1", background: "#1a1200", border: "1px solid #e6a817", borderRadius: 4, padding: "10px 14px" }}>
                      <div style={{ fontSize: 10, color: "#e6a817", letterSpacing: 2, marginBottom: 6 }}>📅 END DATE PROJECTION — BASED ON PULL</div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 16, alignItems: "center" }}>
                        {prog.pullAvgPerDay && (
                          <span style={{ fontSize: 12, color: "#ffd166" }}>
                            Avg pull rate: <strong>{prog.pullAvgPerDay.toLocaleString()} ft/day</strong>
                          </span>
                        )}
                        <span style={{ fontSize: 12, color: "#ffd166" }}>
                          Remaining pull: <strong>{prog.pullRemaining.toLocaleString()} ft</strong>
                        </span>
                        <span style={{ fontSize: 12, color: "#ffd166" }}>
                          Est. <strong>{prog.remainingDays} workdays</strong> left
                        </span>
                        <span style={{ fontSize: 14, fontWeight: 700, color: "#fff", marginLeft: "auto" }}>
                          Updated end: <strong style={{ color: "#ffd166" }}>{prog.updatedEndDate}</strong>
                        </span>
                      </div>
                    </div>
                  )}

                  {/* Per-segment pull breakdown */}
                  {prog.segmentProgress && prog.segmentProgress.length > 1 && (
                    <div style={{ gridColumn: "1 / -1" }}>
                      <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2, marginBottom: 8 }}>PULL PROGRESS BY SEGMENT</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {prog.segmentProgress.map((seg, idx) => (
                          <div key={seg.id} style={{ background: "#0a0f18", border: "1px solid #1a2840", borderRadius: 4, padding: "10px 14px" }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                              <span style={{ fontSize: 11, color: "#7ec8f7", fontWeight: 700 }}>
                                SEG {idx + 1}: {seg.pipeSize || "—"} {seg.pipeSpec || ""} · {Number(seg.segFootage).toLocaleString()} ft
                              </span>
                              <span style={{ fontSize: 11, color: "#ffd166", fontFamily: "'Share Tech Mono', monospace" }}>
                                Pull: {seg.segPullPct}% · Drill: {seg.segDrillPct}%
                              </span>
                            </div>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                              <div>
                                <div style={{ background: "#1a2840", borderRadius: 3, height: 6 }}>
                                  <div style={{ width: seg.segDrillPct + "%", height: "100%", background: seg.segDrillPct >= 100 ? "#2dbd4e" : "#2d7dd2", borderRadius: 3 }} />
                                </div>
                                <div style={{ fontSize: 9, color: "#4a6fa5", marginTop: 2 }}>⛏ {Number(seg.segDrillDone).toLocaleString()} / {Number(seg.segFootage).toLocaleString()} ft drilled</div>
                              </div>
                              <div>
                                <div style={{ background: "#2a1a00", borderRadius: 3, height: 6 }}>
                                  <div style={{ width: seg.segPullPct + "%", height: "100%", background: seg.segPullPct >= 100 ? "#2dbd4e" : "#e6a817", borderRadius: 3 }} />
                                </div>
                                <div style={{ fontSize: 9, color: "#4a6fa5", marginTop: 2 }}>🔧 {Number(seg.segPullDone).toLocaleString()} / {Number(seg.segFootage).toLocaleString()} ft pulled</div>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* Operation toggle + new entry form */}
            <div style={{ background: "#0d1b2a", border: "1px solid #1a2840", borderRadius: 6, padding: 16, marginBottom: 20 }}>
              <div style={{ fontSize: 11, color: "#4a6fa5", letterSpacing: 2, marginBottom: 12 }}>LOG NEW FOOTAGE ENTRY</div>

              {/* Services / Mainline toggle */}
              <div style={{ display: "flex", gap: 0, marginBottom: 14, borderRadius: 4, overflow: "hidden", border: "1px solid #2a3548" }}>
                {[["pull","🔧 MAINLINE","#e6a817","#1a1200"], ["service","🔌 SERVICES","#a78bfa","#1a0a2e"]].map(([op, label, activeColor, activeBg]) => (
                  <button key={op} className="btn" onClick={() => setLogEntry(l => ({ ...l, operation: "pull", logType: op, segmentId: "" }))}
                    style={{ flex: 1, padding: "10px", fontSize: 13, fontWeight: 700, letterSpacing: 1, borderRadius: 0,
                      background: (op === "service" ? (logEntry.logType === "service") : (logEntry.logType !== "service")) ? activeBg : "#0a0f18",
                      color: (op === "service" ? (logEntry.logType === "service") : (logEntry.logType !== "service")) ? activeColor : "#4a6fa5",
                      borderRight: op === "pull" ? "1px solid #2a3548" : "none",
                      outline: (op === "service" ? (logEntry.logType === "service") : (logEntry.logType !== "service")) ? `2px solid ${activeColor}` : "none",
                      outlineOffset: "-2px" }}>
                    {label}
                  </button>
                ))}
              </div>

              {/* Segment selector — filtered by logType */}
              {(progressJob.segments || []).length > 0 && (() => {
                const visibleSegs = (progressJob.segments || []).filter(seg =>
                  logEntry.logType === "service" ? isServiceSeg(seg) : !isServiceSeg(seg)
                );
                return visibleSegs.length > 0 ? (
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 10, color: logEntry.logType === "service" ? "#a78bfa" : "#4a6fa5", letterSpacing: 2, marginBottom: 6 }}>
                      {logEntry.logType === "service" ? "SERVICE SEGMENT" : "PIPE SEGMENT"}
                    </div>
                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                      {visibleSegs.map((seg, idx) => {
                        const selected = logEntry.segmentId === seg.id;
                        const svc = isServiceSeg(seg);
                        return (
                          <button key={seg.id} type="button" className="btn"
                            onClick={() => setLogEntry(l => ({ ...l, segmentId: selected ? "" : seg.id }))}
                            style={{ padding: "7px 14px", fontSize: 12, fontWeight: 700, letterSpacing: 1,
                              background: selected ? (svc ? "#1a0a2e" : "#1a2840") : "#0a0f18",
                              border: `2px solid ${selected ? (svc ? "#a78bfa" : "#2d7dd2") : "#2a3548"}`,
                              color: selected ? (svc ? "#c4b5fd" : "#7ec8f7") : "#4a6fa5" }}>
                            {svc
                              ? (seg.segType === "Long Side Service" ? "🔌 LONG SIDE" : "🔌 SHORT SIDE")
                              : `${seg.pipeSize || "?"} ${seg.pipeSpec || ""} ${seg.footage ? `(${Number(seg.footage).toLocaleString()} ft)` : ""}`.trim()}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                ) : (
                  logEntry.logType === "service" ? (
                    <div style={{ marginBottom: 14, padding: "10px 14px", background: "#1a0a2e", border: "1px solid #6d28d9", borderRadius: 5, fontSize: 11, color: "#a78bfa" }}>
                      No service segments found. Edit this job and add a Long Side or Short Side Service segment first.
                    </div>
                  ) : null
                );
              })()}

              {(() => {
                const selectedSeg = (progressJob.segments || []).find(s => s.id === logEntry.segmentId);
                const isService = logEntry.logType === "service" || (selectedSeg && isServiceSeg(selectedSeg));
                const serviceTotal = (isService && selectedSeg) ? parseInt(selectedSeg.serviceCount) || 0 : 0;
                const serviceDone  = (isService && selectedSeg) ? (progressJob.footageLog || []).filter(e => e.operation === "pull" && e.segmentId === selectedSeg.id).length : 0;
                return (
                  <>
                    {isService && (
                      <div style={{ background: "#1a0a2e", border: "1px solid #6d28d9", borderRadius: 5, padding: "10px 14px", marginBottom: 12 }}>
                        <div style={{ fontSize: 11, color: "#c4b5fd", fontWeight: 700, letterSpacing: 1 }}>
                          🔌 SERVICE MODE — each log entry = 1 completed service
                        </div>
                        {serviceTotal > 0 && (
                          <div style={{ fontSize: 11, color: "#a78bfa", marginTop: 4 }}>
                            Progress: {serviceDone} of {serviceTotal} complete
                          </div>
                        )}
                      </div>
                    )}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                      <div>
                        <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2, marginBottom: 5 }}>DATE</div>
                        <input type="date" value={logEntry.date} onChange={e => setLogEntry(l => ({ ...l, date: e.target.value }))}
                          style={{ background: "#0a0f18" }} />
                      </div>
                      <div>
                        <div style={{ fontSize: 10, color: "#4a6fa5", letterSpacing: 2, marginBottom: 5 }}>RIG NUMBER</div>
                        <select value={logEntry.rig} onChange={e => setLogEntry(l => ({ ...l, rig: e.target.value }))}

                        {importPreview.map((row, i) => {
                          const fc = FOREMAN_COLORS[row.foreman] || DEFAULT_FOREMAN_COLOR;
                          const statusColors = { "Scheduled": "#7ec8f7", "In Progress": "#7affa0", "Completed": "#a0ffd6", "On Hold": "#ffd166", "Cancelled": "#ff8a80" };
                          return (
                            <tr key={i} style={{ borderBottom: "1px solid #0d1520", background: i % 2 === 0 ? "#0d1117" : "#0b0f15" }}>
                              <td style={{ padding: "7px 10px", color: "#4a6fa5" }}>{i + 1}</td>
                              <td style={{ padding: "7px 10px", color: "#d0d8e4", maxWidth: 160, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{row.jobName || "—"}</td>
                              <td style={{ padding: "7px 10px", color: "#b0c0d4" }}>{row.client || "—"}</td>
                              <td style={{ padding: "7px 10px", color: "#b0c0d4", maxWidth: 120, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{row.location || "—"}</td>
                              <td style={{ padding: "7px 10px" }}>
                                {row.foreman ? <span style={{ background: fc.bg, color: fc.text, border: `1px solid ${fc.border}`, borderRadius: 3, padding: "1px 6px" }}>{row.foreman}</span> : <span style={{ color: "#4a6fa5" }}>—</span>}
                              </td>
                              <td style={{ padding: "7px 10px", color: "#b0c0d4", whiteSpace: "nowrap" }}>{row.startDate || "—"}</td>
                              <td style={{ padding: "7px 10px", color: "#d0d8e4" }}>{row.footage ? `${Number(row.footage).toLocaleString()} ft` : "—"}</td>
                              <td style={{ padding: "7px 10px", color: "#7affa0" }}>{row.pricePerFoot ? `$${parseFloat(row.pricePerFoot).toFixed(2)}` : "—"}</td>
                              <td style={{ padding: "7px 10px", color: "#b0c0d4", whiteSpace: "nowrap" }}>{[row.pipeSize, row.pipeSpec].filter(Boolean).join(" ") || "—"}</td>
                              <td style={{ padding: "7px 10px" }}>
                                <span style={{ color: statusColors[row.status] || "#d0d8e4", fontWeight: 600 }}>{row.status}</span>
                              </td>
                              <td style={{ padding: "7px 10px", color: "#4a6fa5", maxWidth: 140, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{row.notes || "—"}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>

                  {importError && <div style={{ marginTop: 12, color: "#ff8a80", fontSize: 12 }}>⚠ {importError}</div>}

                  <div style={{ display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 18 }}>
                    <button className="btn" onClick={() => { setShowImportModal(false); setImportPreview([]); setImportError(""); }}
                      style={{ background: "#1a2840", border: "1px solid #2a3548", color: "#d0d8e4", padding: "10px 20px", fontSize: 13, letterSpacing: 1 }}>
                      CANCEL
                    </button>
                    <button className="btn" onClick={confirmImport}
                      style={{ background: "#2d7dd2", color: "#fff", padding: "10px 28px", fontSize: 14, fontWeight: 700, letterSpacing: 1 }}>
                      ✓ ADD {importPreview.length} JOB{importPreview.length !== 1 ? "S" : ""} TO CALENDAR
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* Toast */}
      {toast && (
        <div style={{ position: "fixed", bottom: 24, right: 24, background: toast.type === "error" ? "#1a0a0a" : "#0d1b2a",
          border: `1px solid ${toast.type === "error" ? "#c0392b" : "#2d7dd2"}`,
          borderRadius: 6, padding: "12px 20px", fontSize: 14, color: toast.type === "error" ? "#ff8a80" : "#7ec8f7",
          fontWeight: 600, letterSpacing: 1, zIndex: 200, boxShadow: "0 4px 24px rgba(0,0,0,.5)" }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(HDDCalendar));
  </script>
</body>
</html>
