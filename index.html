  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    input:focus, select:focus, textarea:focus { border-color: #2d7dd2; }
    .btn { cursor: pointer; border-radius: 4px; font-family: 'Rajdhani', sans-serif; font-weight: 600; letter-spacing: 1px; transition: opacity .15s; border: none; }
    .btn:hover { opacity: .85; }
    .btn:active { opacity: .7; }
    .slide-in { animation: slideIn .18s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #2a3548; border-radius: 3px; }

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;


const PIPE_SIZES = ["3/4\"", "1 1/4\"", "2\"", "3\"", "4\"", "6\"", "8\"", "10\"", "12\"", "16\"", "20\"", "24\"", "Other"];
const PIPE_SPECS = ["HDPE", "PVC", "Steel Casing", "HDPE Casing"];
const RIG_NUMBERS = ["BR-003", "BR-004", "BR-005", "BR-006", "BR-007"];
const BORE_NUMBERS = Array.from({ length: 50 }, (_, i) => String(i + 1));
const FOREMEN = ["Jason", "Jeff", "Hugo", "Gerardo", "Roberto", "Uriel"];
const CLIENT_OPTIONS = ["SPS", "TAD", "PAN", "BOB", "TSU"];

// Each foreman gets a distinct hue — bg, border, text
const FOREMAN_COLORS = {
  "Jason":   { bg: "#1a1a3a", border: "#6c63ff", text: "#b8b5ff" },
  "Jeff":    { bg: "#1a2e1a", border: "#22c55e", text: "#86efac" },
  "Hugo":    { bg: "#2e1a1a", border: "#ef4444", text: "#fca5a5" },
  "Gerardo": { bg: "#1a1a1a", border: "#ffffff", text: "#ffffff" },
  "Roberto": { bg: "#1a2a2e", border: "#06b6d4", text: "#67e8f9" },
  "Uriel":   { bg: "#2a2a1a", border: "#f59e0b", text: "#fcd34d" },
};
const DEFAULT_FOREMAN_COLOR = { bg: "#1a3a5c", border: "#2d7dd2", text: "#7ec8f7" };

function getForemanColor(foreman) {
  if (!foreman) return DEFAULT_FOREMAN_COLOR;
  return FOREMAN_COLORS[foreman] || DEFAULT_FOREMAN_COLOR;
}

const STATUS_OPTIONS = ["Scheduled", "In Progress", "Completed", "On Hold", "Cancelled"];

const STATUS_COLORS = {
  "Scheduled":   { bg: "#1a3a5c", border: "#2d7dd2", text: "#7ec8f7" },
  "In Progress": { bg: "#1a3a1a", border: "#2dbd4e", text: "#7affa0" },
  "Completed":   { bg: "#2a2a2a", border: "#888",    text: "#ccc"    },
  "On Hold":     { bg: "#3a2e0a", border: "#e6a817", text: "#ffd166" },
  "Cancelled":   { bg: "#3a0a0a", border: "#c0392b", text: "#ff8a80" },
};

const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAY_NAMES   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function generateId() {
  return "job_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7);
}

function parseDate(str) {
  if (!str) return null;
  const d = new Date(str + "T12:00:00");
  return isNaN(d) ? null : d;
}

function formatDate(d) {
  if (!d) return "";
  return d.toISOString().slice(0, 10);
}

function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}

// Add N working days (Mon-Fri) to a start date
function addWorkdays(date, days) {
  const d = new Date(date);
  // If start is weekend, move to Monday first
  while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() + 1);
  let remaining = parseInt(days) - 1;
  while (remaining > 0) {
    d.setDate(d.getDate() + 1);
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) remaining--;
  }
  return d;
}

// Count working days between two dates (inclusive)
function countWorkdays(start, end) {
  let count = 0;
  const d = new Date(start);
  while (d <= end) {
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) count++;
    d.setDate(d.getDate() + 1);
  }
  return count;
}

function calcEndDate(startDate, duration) {
  if (!startDate || !duration) return null;
  const start = parseDate(startDate);
  if (!start) return null;
  return addWorkdays(start, parseInt(duration));
}

// Get total footage across all segments (supports legacy single-footage jobs)
function getTotalFootage(job) {
  if (job.segments && job.segments.length > 0) {
    return job.segments.reduce((s, seg) => s + (parseFloat(seg.footage) || 0), 0);
  }
  return parseFloat(job.footage) || 0;
}

// Get total revenue across all segments
function getTotalRevenue(job) {
  if (job.segments && job.segments.length > 0) {
    return job.segments.reduce((s, seg) => s + (parseFloat(seg.footage) || 0) * (parseFloat(seg.pricePerFoot) || 0), 0);
  }
  return (parseFloat(job.footage) || 0) * (parseFloat(job.pricePerFoot) || 0);
}

// Calculate derived progress stats for a job
function calcJobProgress(job) {
  const totalFootage = getTotalFootage(job);
  const log = job.footageLog || [];

  const drillLog = log.filter(e => !e.operation || e.operation === "drill");
  const pullLog  = log.filter(e => e.operation === "pull");

  const drillDone = drillLog.reduce((s, e) => s + (parseFloat(e.footage) || 0), 0);
  const pullDone  = pullLog.reduce((s,  e) => s + (parseFloat(e.footage) || 0), 0);

  const drillRemaining = Math.max(0, totalFootage - drillDone);
  const pullRemaining  = Math.max(0, totalFootage - pullDone);

  const drillPct = totalFootage > 0 ? Math.min(100, Math.round((drillDone / totalFootage) * 100)) : 0;
  const pullPct  = totalFootage > 0 ? Math.min(100, Math.round((pullDone  / totalFootage) * 100)) : 0;

  // Per-segment pull progress
  const segmentProgress = (job.segments || []).map(seg => {
    const segFootage = parseFloat(seg.footage) || 0;
    const segPullDone = pullLog.filter(e => e.segmentId === seg.id).reduce((s, e) => s + (parseFloat(e.footage) || 0), 0);
    const segDrillDone = drillLog.filter(e => e.segmentId === seg.id).reduce((s, e) => s + (parseFloat(e.footage) || 0), 0);
    const segPullPct = segFootage > 0 ? Math.min(100, Math.round((segPullDone / segFootage) * 100)) : 0;
    const segDrillPct = segFootage > 0 ? Math.min(100, Math.round((segDrillDone / segFootage) * 100)) : 0;
    return { ...seg, segDrillDone, segPullDone, segDrillPct, segPullPct, segFootage };
  });

  // Split pull progress: mainline vs services
  const segs = job.segments || [];
  const mainlineSegs = segs.filter(s => !isServiceSeg(s));
  const serviceSegs  = segs.filter(s =>  isServiceSeg(s));
  const mainlineTotalFt  = mainlineSegs.reduce((a, s) => a + (parseFloat(s.footage) || 0), 0);
  const servicesTotalFt  = serviceSegs.reduce((a, s) => a + (parseFloat(s.footage) || 0), 0);
  const hasServiceSegs   = serviceSegs.length > 0;

  // Build sets of IDs for fast lookup
  const mainlineSegIds = new Set(mainlineSegs.map(s => s.id));
  const serviceSegIds  = new Set(serviceSegs.map(s => s.id));

  // Service counts: total expected = sum of serviceCount on service segs
  // Completed = number of pull log entries tagged to a service segment (each entry = 1 service done)
  const servicesTotalCount = serviceSegs.reduce((a, s) => a + (parseInt(s.serviceCount) || 0), 0);
  const servicesDoneCount  = pullLog.filter(e => serviceSegIds.has(e.segmentId)).reduce((a, e) => a + (parseInt(e.serviceCount) || 1), 0);
  const servicesPct        = servicesTotalCount > 0 ? Math.min(100, Math.round((servicesDoneCount / servicesTotalCount) * 100)) : 0;

  // Mainline: footage-based as before
  let mainlinePullDone = 0;
  pullLog.forEach(e => {
    const ft = parseFloat(e.footage) || 0;
    if (mainlineSegIds.has(e.segmentId)) {
      mainlinePullDone += ft;
    } else if (!e.segmentId && !hasServiceSegs) {
      // Untagged on a mainline-only job
      mainlinePullDone += ft;
    }
  });

  const mainlinePullPct = mainlineTotalFt > 0 ? Math.min(100, Math.round((mainlinePullDone / mainlineTotalFt) * 100)) : 0;

  // Keep legacy aliases so nothing else breaks
  const servicesPullDone = servicesDoneCount;
  const servicesPullPct  = servicesPct;

  // Overall = average of drill + pull completion
  const overallPct = Math.round((drillPct + pullPct) / 2);

  // Adjusted end date is always based on PULL remaining footage + pull avg production rate
  let remainingDays = null;
  let updatedEndDate = null;
  let pullAvgPerDay = null;

  if (pullLog.length > 0) {
    pullAvgPerDay = pullLog.reduce((s, e) => s + (parseFloat(e.footage) || 0), 0) / pullLog.length;
  } else if (drillLog.length > 0) {
    pullAvgPerDay = drillLog.reduce((s, e) => s + (parseFloat(e.footage) || 0), 0) / drillLog.length;
  }

  if (pullAvgPerDay > 0 && pullRemaining > 0) {
    remainingDays = Math.ceil(pullRemaining / pullAvgPerDay);
    updatedEndDate = formatDate(addWorkdays(new Date(), remainingDays));
  }

  return {
    drillDone, drillRemaining, drillPct,
    pullDone,  pullRemaining,  pullPct,
    pullAvgPerDay: pullAvgPerDay ? Math.round(pullAvgPerDay) : null,
    overallPct, remainingDays, updatedEndDate,
    segmentProgress,
    totalFootage,
    // mainline vs services split
    mainlinePullDone, mainlinePullPct, mainlineTotalFt,
    servicesPullDone, servicesPullPct, servicesTotalFt,
    servicesTotalCount, servicesDoneCount, servicesPct,
    hasServiceSegs,
    // legacy alias
    completedFootage: drillDone, remainingFootage: drillRemaining, pct: overallPct,
  };
}

// Calculate total paused workdays for a job
function calcPausedWorkdays(pauseLog) {
  if (!pauseLog || pauseLog.length === 0) return 0;
  let total = 0;
  pauseLog.forEach(p => {
    if (p.pauseDate && p.resumeDate) {
      const s = new Date(p.pauseDate + "T12:00:00");
      const e = new Date(p.resumeDate + "T12:00:00");
      if (e > s) total += countWorkdays(s, e) - 1; // don't count resume day itself
    }
  });
  return total;
}

function jobsOnDate(jobs, date) {
  const dow = date.getDay();
  if (dow === 0 || dow === 6) return []; // No work on weekends
  return jobs.filter(j => {
    const s = parseDate(j.startDate);
    const e = parseDate(j.endDate);
    if (!s || !e) return false;
    return date >= s && date <= e;
  });
}

const defaultSegment = () => ({ id: "seg_" + Date.now() + "_" + Math.random().toString(36).slice(2,6), pipeSize: "", pipeSpec: "", segType: "Mainline", footage: "", pricePerFoot: "", serviceCount: "" });
const SEG_TYPES = ["Mainline", "Long Side Service", "Short Side Service"];
const isServiceSeg = seg => seg.segType === "Long Side Service" || seg.segType === "Short Side Service";

const defaultForm = {
  id: null, jobName: "", client: "", location: "", foreman: "",
  bidDate: "", startDate: "", endDate: "", duration: "",
  segments: [defaultSegment()],
  status: "Scheduled", notes: "", footageLog: [], pauseLog: []
};

function HDDCalendar() {
  const [jobs, setJobs] = useState([]);
  const [view, setView] = useState("calendar"); // calendar | list
  const [currentDate, setCurrentDate] = useState(new Date());
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState(defaultForm);
  const [selectedJob, setSelectedJob] = useState(null);
  const [listening, setListening] = useState(false);
  const [transcript, setTranscript] = useState("");
  const [voiceStatus, setVoiceStatus] = useState("");
  const [toast, setToast] = useState(null);
  const recognitionRef = useRef(null);
  const voiceInputRef = useRef(null);
  const [showProgressModal, setShowProgressModal] = useState(false);
  const [progressJob, setProgressJob] = useState(null);
  const [logEntry, setLogEntry] = useState({ date: new Date().toISOString().slice(0,10), operation: "pull", logType: "mainline", rig: "", bore: "", footage: "", notes: "", streetNumber: "", streetName: "" });
  const [editingEntryId, setEditingEntryId] = useState(null);
  const [editEntryData, setEditEntryData] = useState({});
  const [showPauseModal, setShowPauseModal] = useState(false);
  const [pauseModalJob, setPauseModalJob] = useState(null);
  const [pauseDate, setPauseDate] = useState("");
  const [resumeDate, setResumeDate] = useState("");
  const [showImportModal, setShowImportModal] = useState(false);
  const [importPreview, setImportPreview] = useState([]);
  const [importError, setImportError] = useState("");
  const [importLoading, setImportLoading] = useState(false);
  const importFileRef = useRef(null);

  // Load from storage
  useEffect(() => {
    try {
      const saved = localStorage.getItem("hunter_underground_jobs");
      if (saved) {
        const parsed = JSON.parse(saved);
        const migrated = parsed.map(job => ({
          ...job,
          segments: (job.segments || []).map(seg => ({
            ...seg,
            segType: seg.segType || "Mainline"
          }))
        }));
        setJobs(migrated);
      }
    } catch {}
  }, []);

  // Save to localStorage whenever jobs change
  const [saveStatus, setSaveStatus] = useState("");
  useEffect(() => {
    try {
      localStorage.setItem("hunter_underground_jobs", JSON.stringify(jobs));
      setSaveStatus("SAVED");
      const t = setTimeout(() => setSaveStatus(""), 2000);
      return () => clearTimeout(t);
    } catch {
      setSaveStatus("SAVE FAILED");
    }
  }, [jobs]);

  const showToast = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3500);
  };

  // ── VOICE ──────────────────────────────────────────────────────────────────
  const processVoiceCommand = useCallback((text) => {
    const t = text.toLowerCase();
    setVoiceStatus('Processing: "' + text + '"');

    // ADD JOB
    if (t.includes("add job") || t.includes("new job") || t.includes("create job")) {
      setForm({ ...defaultForm, id: null });
      setShowModal(true);
      setVoiceStatus("Opening new job form…");
      return;
    }
    // SHOW LIST
    if (t.includes("show list") || t.includes("list view") || t.includes("all jobs")) {
      setView("list"); setVoiceStatus("Switched to list view.");
      return;
    }
    // SHOW CALENDAR
    if (t.includes("show calendar") || t.includes("calendar view")) {
      setView("calendar"); setVoiceStatus("Switched to calendar view.");
      return;
    }
    // NEXT/PREV MONTH
    if (t.includes("next month")) {
      setCurrentDate(d => new Date(d.getFullYear(), d.getMonth() + 1, 1));
      setVoiceStatus("Moved to next month.");
      return;
    }
    if (t.includes("previous month") || t.includes("last month") || t.includes("prev month")) {
      setCurrentDate(d => new Date(d.getFullYear(), d.getMonth() - 1, 1));
      setVoiceStatus("Moved to previous month.");
      return;
    }
    // TODAY
    if (t.includes("today") || t.includes("go to today")) {
      setCurrentDate(new Date());
      setVoiceStatus("Jumped to today.");
      return;
    }
    // STATUS UPDATE  e.g. "mark job Riverside complete" / "set job 2 in progress"
    const statusMap = {
      "complete": "Completed", "completed": "Completed",
      "in progress": "In Progress", "started": "In Progress",
      "on hold": "On Hold", "hold": "On Hold",
      "cancel": "Cancelled", "cancelled": "Cancelled",
      "schedule": "Scheduled", "scheduled": "Scheduled",
    };
    for (const [kw, status] of Object.entries(statusMap)) {
      if (t.includes(kw)) {
        // try to find job by name fragment
        const after = t.split(kw)[0];
        const match = jobs.find(j => after.includes(j.jobName.toLowerCase()) || after.includes(j.client.toLowerCase()));
        if (match) {
          setJobs(js => js.map(j => j.id === match.id ? { ...j, status } : j));
          setVoiceStatus(`Updated "${match.jobName}" to ${status}.`);
          showToast(`"${match.jobName}" → ${status}`);
          return;
        }
      }
    }
    setVoiceStatus('Command not recognized. Try: "add job", "next month", "show list", "mark [job] complete".');
  }, [jobs]);

  const isMobile = () => /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  const toggleVoice = () => {
    // On mobile: focus the hidden speech input to trigger native keyboard mic
    if (isMobile()) {
      if (voiceInputRef.current) {
        voiceInputRef.current.value = "";
        voiceInputRef.current.focus();
        setListening(true);
        setTranscript("");
        setVoiceStatus("Tap the mic on your keyboard to speak…");
      }
      return;
    }
    // Desktop: use Web Speech API
    if (!("webkitSpeechRecognition" in window || "SpeechRecognition" in window)) {
      setVoiceStatus("Voice not supported — try Chrome or Edge.");
      return;
    }
    if (listening) {
      recognitionRef.current?.stop();
      setListening(false);
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const r = new SR();
    r.lang = "en-US";
    r.interimResults = true;
    r.continuous = false;
    r.onresult = e => {
      const interim = Array.from(e.results).map(x => x[0].transcript).join("");
      setTranscript(interim);
      if (e.results[e.results.length - 1].isFinal) {
        processVoiceCommand(interim);
      }
    };
    r.onend = () => { setListening(false); };
    r.onerror = (e) => { setVoiceStatus("Mic error: " + e.error); setListening(false); };
    recognitionRef.current = r;
    r.start();
    setListening(true);
    setTranscript("");
    setVoiceStatus("Listening…");
  };

  const handleVoiceInput = (e) => {
    const val = e.target.value.trim();
    if (!val) return;
    setTranscript(val);
    setListening(false);
    processVoiceCommand(val);
    e.target.value = "";
    e.target.blur();
  };

  // ── FORM ───────────────────────────────────────────────────────────────────
  const handleFormChange = (field, val) => {
    setForm(f => {
      const updated = { ...f, [field]: val };
      // Auto-calc end date from start + duration
      if ((field === "startDate" || field === "duration") && updated.startDate && updated.duration) {
        const end = calcEndDate(updated.startDate, updated.duration);
        if (end) updated.endDate = formatDate(end);
      }
      // Auto-calc duration from start + end (workdays only)
      if (field === "endDate" && updated.startDate && updated.endDate) {
        const s = parseDate(updated.startDate), e = parseDate(updated.endDate);
        if (s && e && e >= s) updated.duration = String(countWorkdays(s, e));
      }
      return updated;
    });
  };

  const saveJob = () => {
    if (!form.jobName || !form.startDate || !form.endDate) {
      showToast("Job name, start & end dates are required.", "error");
      return;
    }
    if (form.id) {
      setJobs(js => js.map(j => j.id === form.id ? { ...form } : j));
      showToast("Job updated!");
    } else {
      setJobs(js => [...js, { ...form, id: generateId() }]);
      showToast("Job added!");
    }
    setShowModal(false);
    setForm(defaultForm);
  };

  const deleteJob = (id) => {
    setJobs(js => js.filter(j => j.id !== id));
    setSelectedJob(null);
    showToast("Job deleted.", "error");
  };

  const openProgress = (job) => {
    setProgressJob(job);
    setLogEntry({ date: new Date().toISOString().slice(0, 10), operation: "drill", rig: "", footage: "", notes: "" });
    setShowProgressModal(true);
  };

  const saveLogEntry = () => {
    // Determine if this is a service log entry
    const selectedSeg = (progressJob.segments || []).find(s => s.id === logEntry.segmentId);
    const entryIsService = selectedSeg && isServiceSeg(selectedSeg);
    if (!logEntry.date) {
      showToast("Date is required.", "error");
      return;
    }
    if (!entryIsService && !logEntry.footage) {
      showToast("Date and footage are required.", "error");
      return;
    }
    // For service entries, store serviceCount; for mainline, store footage
    const entryToSave = entryIsService
      ? { ...logEntry, operation: "pull", footage: "", serviceCount: parseInt(logEntry.serviceCount) || 1, id: generateId() }
      : { ...logEntry, id: generateId() };
    const updatedJob = {
      ...progressJob,
      footageLog: [...(progressJob.footageLog || []), entryToSave]
    };
    if (updatedJob.status === "Scheduled") updatedJob.status = "In Progress";
    // Auto-complete when services and mainline both hit 100%
    const prog = calcJobProgress(updatedJob);
    if (prog.servicesPct >= 100 && prog.mainlinePullPct >= 100 && (prog.servicesTotalCount > 0 || prog.mainlineTotalFt > 0)) {
      updatedJob.status = "Completed";
    }
    // Auto-update end date based on pull progress rate
    if (prog.updatedEndDate && updatedJob.startDate) {
      updatedJob.endDate = prog.updatedEndDate;
      const s = parseDate(updatedJob.startDate), e = parseDate(prog.updatedEndDate);
      if (s && e && e >= s) updatedJob.duration = String(countWorkdays(s, e));
    }
    setJobs(js => js.map(j => j.id === updatedJob.id ? updatedJob : j));
    setProgressJob(updatedJob);
    const svcCount = parseInt(logEntry.serviceCount) || 1;
    setLogEntry({ date: new Date().toISOString().slice(0, 10), operation: "pull", logType: logEntry.logType, rig: logEntry.rig, bore: logEntry.bore, footage: "", serviceCount: 1, segmentId: logEntry.segmentId, notes: "", streetNumber: "", streetName: "" });
    const endMsg = prog.updatedEndDate ? ` · Est. completion: ${prog.updatedEndDate}` : "";
    showToast(entryIsService
      ? `🔌 ${svcCount} service${svcCount > 1 ? "s" : ""} logged!`
      : `🔧 Mainline footage logged!${endMsg}`);
  };

  const deleteLogEntry = (jobId, entryId) => {
    setJobs(js => js.map(j => {
      if (j.id !== jobId) return j;
      const updated = { ...j, footageLog: (j.footageLog || []).filter(e => e.id !== entryId) };
      return updated;
    }));
    setProgressJob(prev => ({ ...prev, footageLog: (prev.footageLog || []).filter(e => e.id !== entryId) }));
    showToast("Entry removed.", "error");
  };

  const startEditEntry = (entry) => {
    setEditingEntryId(entry.id);
    setEditEntryData({ ...entry });
  };

  const cancelEditEntry = () => {
    setEditingEntryId(null);
    setEditEntryData({});
  };

  const saveEditEntry = () => {
    if (!editEntryData.date || !editEntryData.footage) {
      showToast("Date and footage are required.", "error");
      return;
    }
    const updatedJob = {
      ...progressJob,
      footageLog: (progressJob.footageLog || []).map(e => e.id === editingEntryId ? { ...editEntryData } : e)
    };
    // Recalculate end date based on updated pull progress
    const prog = calcJobProgress(updatedJob);
    if (prog.updatedEndDate && updatedJob.startDate) {
      updatedJob.endDate = prog.updatedEndDate;
      const s = parseDate(updatedJob.startDate), e = parseDate(prog.updatedEndDate);
      if (s && e && e >= s) updatedJob.duration = String(countWorkdays(s, e));
    }
    setJobs(js => js.map(j => j.id === updatedJob.id ? updatedJob : j));
    setProgressJob(updatedJob);
    setEditingEntryId(null);
    setEditEntryData({});
    showToast("Entry updated!");
  };

  const openPauseModal = (job) => {
    setPauseModalJob(job);
    setPauseDate(new Date().toISOString().slice(0, 10));
    setResumeDate("");
    setShowPauseModal(true);
    setSelectedJob(null);
  };

  const pauseJob = () => {
    if (!pauseDate) { showToast("Pause date required.", "error"); return; }
    const entry = { id: generateId(), pauseDate, resumeDate: "", notes: "Paused" };
    const updatedJob = {
      ...pauseModalJob,
      status: "On Hold",
      pauseLog: [...(pauseModalJob.pauseLog || []), entry]
    };
    setJobs(js => js.map(j => j.id === updatedJob.id ? updatedJob : j));
    setShowPauseModal(false);
    showToast("Job paused — marked On Hold.");
  };

  const resumeJob = () => {
    if (!resumeDate) { showToast("Resume date required.", "error"); return; }
    // Find the open pause entry (no resumeDate yet) and close it
    const updatedPauseLog = (pauseModalJob.pauseLog || []).map(p =>
      p.resumeDate === "" ? { ...p, resumeDate, notes: "Resumed" } : p
    );
    // Recalculate end date: push end date forward by paused workdays
    const pausedDays = calcPausedWorkdays(updatedPauseLog);
    let newEndDate = pauseModalJob.endDate;
    if (pausedDays > 0 && pauseModalJob.endDate) {
      newEndDate = formatDate(addWorkdays(parseDate(pauseModalJob.endDate), pausedDays));
    }
    const updatedJob = {
      ...pauseModalJob,
      status: "In Progress",
      pauseLog: updatedPauseLog,
      endDate: newEndDate
    };
    setJobs(js => js.map(j => j.id === updatedJob.id ? updatedJob : j));
    setShowPauseModal(false);
    showToast(`Job resumed · End date updated to ${newEndDate}`);
  };

  const openEdit = (job) => {
    // Migrate legacy single-pipe jobs to segments format
    const segments = (job.segments && job.segments.length > 0)
      ? job.segments
      : job.footage
        ? [{ id: "seg_legacy_" + job.id, pipeSize: job.pipeSize || "", pipeSpec: job.pipeSpec || "", footage: job.footage, pricePerFoot: job.pricePerFoot || "" }]
        : [defaultSegment()];
    setForm({ ...job, segments });
    setSelectedJob(null);
    setShowModal(true);
  };

  // ── BACKUP / RESTORE ───────────────────────────────────────────────────────
  const exportBackup = () => {
    const data = JSON.stringify({ version: 1, exportDate: new Date().toISOString(), jobs }, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const dateStr = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `hunter-underground-backup-${dateStr}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(`✓ Backup saved — ${jobs.length} jobs exported`);
  };

  const restoreBackup = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const parsed = JSON.parse(evt.target.result);
        const restored = parsed.jobs || parsed; // support both wrapped and raw arrays
        if (!Array.isArray(restored)) { showToast("Invalid backup file.", "error"); return; }
        setJobs(restored);
        showToast(`✓ Restored ${restored.length} jobs from backup!`);
      } catch {
        showToast("Could not read backup file.", "error");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  // ── EXCEL IMPORT ───────────────────────────────────────────────────────────
  const handleImportFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setImportError("");
    setImportLoading(true);
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, { type: "array" });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
        if (!rows.length) { setImportError("No data found in sheet."); setImportLoading(false); return; }

        // Flexible column mapping — case-insensitive, partial match
        const colMap = (row) => {
          const k = (name) => {
            const keys = Object.keys(row);
            const match = keys.find(k => k.toLowerCase().replace(/[^a-z0-9]/g,"").includes(name.toLowerCase().replace(/[^a-z0-9]/g,"")));
            return match ? String(row[match] || "").trim() : "";
          };
          // Status mapping: won→Scheduled, lost→Cancelled, pending→Scheduled, in progress→In Progress
          const rawStatus = k("status");
          let status = "Scheduled";
          const sl = rawStatus.toLowerCase();
          if (sl.includes("won") || sl.includes("awarded")) status = "Scheduled";
          else if (sl.includes("lost") || sl.includes("cancel")) status = "Cancelled";
          else if (sl.includes("progress")) status = "In Progress";
          else if (sl.includes("hold")) status = "On Hold";
          else if (sl.includes("complete")) status = "Completed";
          else if (sl.includes("pending") || sl.includes("bid")) status = "Scheduled";

          // Parse foreman — match against known foremen list
          const rawForeman = k("foreman") || k("crew") || k("operator");
          const foreman = FOREMEN.find(f => rawForeman.toLowerCase().includes(f.toLowerCase())) || rawForeman;

          // Parse pipe size
          const rawPipeSize = k("pipesize") || k("pipe");
          const pipeSize = PIPE_SIZES.find(s => rawPipeSize.includes(s)) || rawPipeSize;

          // Parse dates — handle Excel serial numbers
          const parseXlDate = (val) => {
            if (!val) return "";
            if (typeof val === "number") {
              // Excel serial date
              const d = new Date(Math.round((val - 25569) * 86400 * 1000));
              return d.toISOString().slice(0, 10);
            }
            const s = String(val);
            const m = s.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
            if (m) {
              const yr = m[3].length === 2 ? "20" + m[3] : m[3];
              return `${yr}-${m[1].padStart(2,"0")}-${m[2].padStart(2,"0")}`;
            }
            return s;
          };

          const startDate = parseXlDate(k("startdate") || k("startwork") || k("date"));
          const bidDate = parseXlDate(k("biddate") || k("bidsubmission") || k("submitdate") || k("submissiondate") || k("submitted"));
          const rawDuration = k("duration") || k("days") || k("workdays");
          const duration = rawDuration ? String(parseInt(rawDuration) || "") : "";
          const endDate = startDate && duration ? formatDate(addWorkdays(parseDate(startDate), parseInt(duration))) : parseXlDate(k("enddate") || k("completion"));

          const rawFootage = k("footage") || k("feet") || k("ft");
          const footage = String(parseFloat(rawFootage) || "");

          const rawPrice = k("price") || k("rate") || k("perfoot") || k("bidamount") || k("revenue") || k("amount");
          // If it looks like a total bid amount and footage exists, compute per-foot
          let pricePerFoot = "";
          const numericPrice = parseFloat(String(rawPrice).replace(/[$,]/g,""));
          if (!isNaN(numericPrice) && numericPrice > 0) {
            const ft = parseFloat(footage);
            if (ft > 100 && numericPrice > 10000) {
              // Likely a total bid — compute per-foot
              pricePerFoot = (numericPrice / ft).toFixed(2);
            } else {
              pricePerFoot = String(numericPrice);
            }
          }

          return {
            id: generateId(),
            jobName: k("jobname") || k("job") || k("name") || k("project"),
            client: k("client") || k("customer") || k("owner"),
            location: k("location") || k("address") || k("city"),
            foreman,
            bidDate,
            startDate,
            endDate,
            duration,
            footage,
            pipeSize,
            pipeSpec: k("pipespec") || k("material") || k("spec"),
            pricePerFoot,
            status,
            notes: k("notes") || k("comments") || k("description"),
            footageLog: [],
            pauseLog: [],
            _importRow: JSON.stringify(row), // for dedup check
          };
        };

        const previewed = rows.map(colMap).filter(r => r.jobName || r.client);
        if (!previewed.length) { setImportError("Could not find job name or client column. Check your column headers."); setImportLoading(false); return; }
        setImportPreview(previewed);
        setImportLoading(false);
      } catch (err) {
        setImportError("Failed to read file: " + err.message);
        setImportLoading(false);
      }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = "";
  };

  const confirmImport = () => {
    const toAdd = importPreview.map(({ _importRow, ...job }) => job);
    setJobs(js => [...js, ...toAdd]);
    setShowImportModal(false);
    setImportPreview([]);
    showToast(`✓ Imported ${toAdd.length} job${toAdd.length !== 1 ? "s" : ""} successfully!`);
  };

  // ── CALENDAR GRID ──────────────────────────────────────────────────────────
  const [calMode, setCalMode] = useState("month"); // "month" | "week"

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
  const calCells = Array.from({ length: totalCells }, (_, i) => {
    const dayNum = i - firstDay + 1;
    const date = new Date(year, month, dayNum);
    const inMonth = dayNum >= 1 && dayNum <= daysInMonth;
    const dayJobs = inMonth ? jobsOnDate(jobs, date) : [];
    return { dayNum, date, inMonth, dayJobs };
  });

  // Week view helpers
  const getWeekStart = (d) => {
    const day = d.getDay(); // 0=Sun
    const diff = d.getDate() - day;
    return new Date(d.getFullYear(), d.getMonth(), diff);
  };
  const weekStart = getWeekStart(currentDate);
  const weekDays = Array.from({ length: 7 }, (_, i) => {
    const date = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + i);
    const dayJobs = jobsOnDate(jobs, date);
    return { date, dayJobs };
  });
  const prevWeek = () => setCurrentDate(d => new Date(d.getFullYear(), d.getMonth(), d.getDate() - 7));
  const nextWeek = () => setCurrentDate(d => new Date(d.getFullYear(), d.getMonth(), d.getDate() + 7));

  const totalRevenue = jobs.filter(j => j.status !== "Cancelled").reduce((s, j) => s + getTotalRevenue(j), 0);

  // ── RENDER ─────────────────────────────────────────────────────────────────
  return (
    <div style={{
      minHeight: "100vh",
      background: "#0b0e13",
      fontFamily: "'Rajdhani', 'Oswald', sans-serif",
      color: "#d0d8e4",
      position: "relative",
      overflow: "hidden",
    }}>
      {/* Google Fonts */}
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 6px; } 
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #2d7dd2; border-radius: 3px; }
        .btn { cursor: pointer; border: none; border-radius: 4px; font-family: inherit; font-weight: 600; transition: all .15s; }
        .btn:hover { filter: brightness(1.2); }
        input, select, textarea { background: #131820; border: 1px solid #2a3548; border-radius: 4px; color: #d0d8e4;
          padding: 8px 10px; font-family: inherit; font-size: 14px; width: 100%; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #2d7dd2; }
        select option { background: #131820; }
        .cal-cell:hover { background: #151e2a !important; }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }
        .slide-in { animation: slideIn .25s ease; }
        @keyframes slideIn { from{opacity:0;transform:translateY(-10px);} to{opacity:1;transform:translateY(0);} }
      `}</style>

      {/* Header */}
      <div style={{ background: "#0d1117", borderBottom: "2px solid #1a2840", padding: "0 24px" }}>
        <div style={{ maxWidth: 1400, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", height: 64 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
