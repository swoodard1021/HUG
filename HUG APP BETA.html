    input, select, textarea { background: #131820; border: 1px solid #2a3548; border-radius: 4px; color: #d0d8e4; padding: 8px 10px; font-family: 'Rajdhani', sans-serif; font-size: 14px; width: 100%; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: #2d7dd2; }

    .btn { cursor: pointer; border: none; border-radius: 4px; font-family: 'Rajdhani', sans-serif; font-weight: 600; transition: all .15s; }

    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }

    @keyframes slideIn { from{opacity:0;transform:translateY(-10px);} to{opacity:1;transform:translateY(0);} }

<div id="hug-login-overlay" style="position:fixed;inset:0;background:#0b0e13;z-index:99999;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;">
  <div style="width:320px;text-align:center;">
    <div style="font-size:13px;letter-spacing:4px;color:#4a6fa5;margin-bottom:4px;">HUNTER UNDERGROUND</div>
    <div style="font-size:28px;font-weight:700;letter-spacing:3px;color:#fff;margin-bottom:2px;">HUG BETA</div>
    <div style="font-size:11px;letter-spacing:2px;color:#2d7dd2;margin-bottom:32px;">ENTER PIN TO CONTINUE</div>
    <div id="hug-dots" style="display:flex;justify-content:center;gap:12px;margin-bottom:8px;"></div>
    <div id="hug-err" style="font-size:12px;color:#ff8a80;letter-spacing:1px;min-height:20px;margin-bottom:4px;"></div>

  </div>

<div id="root"></div>
<script>
(function(){
  // role -> hash
  var PINS = {
    'admin':   1482477,
    'employee':1537282,
    'Jason':   1537276,
    'Jeff':    1537277,
    'Hugo':    1537278,
    'Gerardo': 1537279,
    'Roberto': 1537280,
    'Uriel':   1537281
  };
  function hash(s){ var h=0; for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;} return h; }
  var stored=''; try{ stored=sessionStorage.getItem('hug_role')||''; }catch(e){}
  var validRoles=Object.keys(PINS).concat(['admin','employee']);
  if(stored && (stored==='admin'||stored==='employee'||['Jason','Jeff','Hugo','Gerardo','Roberto','Uriel'].indexOf(stored)>=0)){
    document.getElementById('hug-login-overlay').style.display='none';
    window.HUG_ROLE=stored; return;
  }
  var pin='';
  function renderDots(){
    var d=document.getElementById('hug-dots'); d.innerHTML='';
    for(var i=0;i<4;i++){
      var dot=document.createElement('div');
      dot.style.cssText='width:16px;height:16px;border-radius:50%;transition:all .15s;background:'+(pin.length>i?'#2d7dd2':'#1a2840')+';border:2px solid '+(pin.length>i?'#2d7dd2':'#2a3548');
      d.appendChild(dot);
    }
  }
  function press(d){
    if(d==='⌫'){ pin=pin.slice(0,-1); document.getElementById('hug-err').textContent=''; renderDots(); return; }
    pin+=d; renderDots();
    if(pin.length>=4){
      var h=hash(pin);
      var matched=null;
      Object.keys(PINS).forEach(function(role){ if(PINS[role]===h) matched=role; });
      if(matched){ unlock(matched); }
      else { document.getElementById('hug-err').textContent='Incorrect PIN'; pin=''; renderDots(); }
    }
  }
  function unlock(role){
    try{ sessionStorage.setItem('hug_role',role); }catch(e){}
    window.HUG_ROLE=role;
    document.getElementById('hug-login-overlay').style.display='none';
    window.dispatchEvent(new CustomEvent('hug-role-set',{detail:role}));
  }
  var digits=['1','2','3','4','5','6','7','8','9','','0','⌫'];
  var pad=document.getElementById('hug-pad');
  digits.forEach(function(d){
    var btn=document.createElement('button');
    btn.textContent=d;
    btn.style.cssText='padding:18px;font-size:22px;font-weight:700;font-family:Rajdhani,sans-serif;background:'+(d?'#0d1b2a':'transparent')+';border:'+(d?'1px solid #1a2840':'none')+';border-radius:8px;color:'+(d==='⌫'?'#ff8a80':d?'#fff':'transparent')+';cursor:'+(d?'pointer':'default');
    if(d) btn.addEventListener('click',function(){ press(d); });
    pad.appendChild(btn);
  });
  renderDots();
})();
</script>
<script>
function initApp() {
  if (!window.React || !window.ReactDOM) {
    setTimeout(initApp, 50); return;
  }
(function() {
  var React = window.React;
  var ReactDOM = window.ReactDOM;
  var { useState, useEffect, useRef, useCallback } = React;
  var ce = React.createElement;

  // ─── CONSTANTS ───────────────────────────────────────────────────────────────
  var PIPE_SIZES = ['3/4"','1 1/4"','2"','3"','4"','6"','8"','10"','12"','16"','20"','24"','Other'];
  var PIPE_SPECS = ['HDPE','PVC','Steel Casing','HDPE Casing'];
  var RIG_NUMBERS = ['BR-003','BR-004','BR-005','BR-006','BR-007'];
  var BORE_NUMBERS = Array.from({length:50},(_,i)=>String(i+1));
  var FOREMEN = ['Jason','Jeff','Hugo','Gerardo','Roberto','Uriel'];
  var CLIENT_OPTIONS = ['SPS','TAD','PAN','BOB','TSU'];
  var SEG_TYPES = ['Mainline','Long Side Service','Short Side Service'];
  var STATUS_OPTIONS = ['Scheduled','In Progress','Completed','On Hold','Cancelled'];

  var FOREMAN_COLORS = {
    'Jason':   { bg:'#3d3878', border:'#8b83ff', text:'#d4d0ff' },
    'Jeff':    { bg:'#1a4a1a', border:'#22c55e', text:'#a0f0a0' },
    'Hugo':    { bg:'#4a1a1a', border:'#ef4444', text:'#ffb0b0' },
    'Gerardo': { bg:'#555555', border:'#e0e0e0', text:'#ffffff' },
    'Roberto': { bg:'#0e3a45', border:'#06b6d4', text:'#7de8f9' },
    'Uriel':   { bg:'#3a3000', border:'#f59e0b', text:'#ffe080' }
  };
  var DEFAULT_FC = { bg:'#1a3a5c', border:'#2d7dd2', text:'#7ec8f7' };
  function getForemanColor(f){ return FOREMAN_COLORS[f]||DEFAULT_FC; }

  var STATUS_COLORS = {
    'Scheduled':  { bg:'#1a3a5c', border:'#2d7dd2', text:'#7ec8f7' },
    'In Progress':{ bg:'#1a3a1a', border:'#2dbd4e', text:'#7affa0' },
    'Completed':  { bg:'#2a2a2a', border:'#888',    text:'#ccc'    },
    'On Hold':    { bg:'#3a2e0a', border:'#e6a817', text:'#ffd166' },
    'Cancelled':  { bg:'#3a0a0a', border:'#c0392b', text:'#ff8a80' }
  };

  var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  var BID_STATUSES = ['draft','submitted','awarded','scheduled','declined','notawarded'];
  var BID_STATUS_CFG = {
    draft:      { label:'DRAFT',       bg:'#1a2840', border:'#2d7dd2', text:'#7ec8f7'  },
    submitted:  { label:'SUBMITTED',   bg:'#2a1a40', border:'#8b5cf6', text:'#c4b5fd'  },
    awarded:    { label:'AWARDED',     bg:'#0a2a0a', border:'#22c55e', text:'#86efac'  },
    scheduled:  { label:'SCHEDULED ✓', bg:'#0a1a2a', border:'#06b6d4', text:'#67e8f9'  },
    declined:   { label:'DECLINED',    bg:'#2a0a0a', border:'#ef4444', text:'#fca5a5'  },
    notawarded: { label:'NOT AWARDED', bg:'#1a1a1a', border:'#555',    text:'#999'     }
  };

  // ─── HELPERS ─────────────────────────────────────────────────────────────────
  function generateId(){ return 'job_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); }
  function bidUid(){     return 'bid_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); }

  function parseDate(str){
    if(!str) return null;
    var d = new Date(str+'T12:00:00');
    return isNaN(d)?null:d;
  }
  function formatDate(d){ return d?d.toISOString().slice(0,10):''; }

  function addWorkdays(date, days){
    var d = new Date(date);
    while(d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()+1);
    var remaining = parseInt(days)-1;
    while(remaining>0){ d.setDate(d.getDate()+1); var dow=d.getDay(); if(dow!==0&&dow!==6) remaining--; }
    return d;
  }
  function countWorkdays(start,end){
    var count=0, d=new Date(start);
    while(d<=end){ var dow=d.getDay(); if(dow!==0&&dow!==6) count++; d.setDate(d.getDate()+1); }
    return count;
  }
  function calcEndDate(startDate, duration){
    if(!startDate||!duration) return null;
    var start = parseDate(startDate);
    if(!start) return null;
    return addWorkdays(start, parseInt(duration));
  }

  var isServiceSeg = seg => seg.segType==='Long Side Service'||seg.segType==='Short Side Service';

  function getTotalFootage(job){
    if(job.segments&&job.segments.length>0)
      return job.segments.reduce((s,seg)=>s+(parseFloat(seg.footage)||0),0);
    return parseFloat(job.footage)||0;
  }
  function getTotalRevenue(job){
    if(job.segments&&job.segments.length>0)
      return job.segments.reduce((s,seg)=>{
        if(isServiceSeg(seg)) return s+(parseInt(seg.serviceCount)||0)*(parseFloat(seg.pricePerFoot)||0);
        return s+(parseFloat(seg.footage)||0)*(parseFloat(seg.pricePerFoot)||0);
      },0);
    return (parseFloat(job.footage)||0)*(parseFloat(job.pricePerFoot)||0);
  }

  function calcPausedWorkdays(pauseLog){
    if(!pauseLog||!pauseLog.length) return 0;
    return pauseLog.reduce((total,p)=>{
      if(p.pauseDate&&p.resumeDate){
        var s=new Date(p.pauseDate+'T12:00:00'), e=new Date(p.resumeDate+'T12:00:00');
        if(e>s) total+=countWorkdays(s,e)-1;
      }
      return total;
    },0);
  }

  function calcJobProgress(job){
    var totalFootage = getTotalFootage(job);
    var log = job.footageLog||[];
    var drillLog = log.filter(e=>e.operation==='drill');
    var pullLog  = log.filter(e=>!e.operation||e.operation==='pull');
    var drillDone = drillLog.reduce((s,e)=>s+(parseFloat(e.footage)||0),0);
    var pullDone  = pullLog.reduce((s,e)=>s+(parseFloat(e.footage)||0),0);
    var drillPct = totalFootage>0?Math.min(100,Math.round(drillDone/totalFootage*100)):0;
    var pullPct  = totalFootage>0?Math.min(100,Math.round(pullDone/totalFootage*100)):0;

    var segs = job.segments||[];
    var mainlineSegs = segs.filter(s=>!isServiceSeg(s));
    var serviceSegs  = segs.filter(s=>isServiceSeg(s));
    var mainlineTotalFt = mainlineSegs.reduce((a,s)=>a+(parseFloat(s.footage)||0),0);
    var hasServiceSegs  = serviceSegs.length>0;
    var mainlineSegIds  = new Set(mainlineSegs.map(s=>s.id));
    var serviceSegIds   = new Set(serviceSegs.map(s=>s.id));

    var servicesTotalCount = serviceSegs.reduce((a,s)=>a+(parseInt(s.serviceCount)||0),0);
    var servicesDoneCount  = pullLog.filter(e=>serviceSegIds.has(e.segmentId)).reduce((a,e)=>a+(parseInt(e.serviceCount)||1),0);
    var servicesPct = servicesTotalCount>0?Math.min(100,Math.round(servicesDoneCount/servicesTotalCount*100)):0;

    var mainlinePullDone = 0;
    pullLog.forEach(e=>{
      var ft=parseFloat(e.footage)||0;
      if(mainlineSegIds.has(e.segmentId)) mainlinePullDone+=ft;
      else if(!e.segmentId&&!hasServiceSegs) mainlinePullDone+=ft;
    });
    var mainlinePullPct = mainlineTotalFt>0?Math.min(100,Math.round(mainlinePullDone/mainlineTotalFt*100)):0;

    var segmentProgress = segs.map(seg=>{
      var segFootage = parseFloat(seg.footage)||0;
      var segPullDone  = pullLog.filter(e=>e.segmentId===seg.id).reduce((s,e)=>s+(parseFloat(e.footage)||0),0);
      var segDrillDone = drillLog.filter(e=>e.segmentId===seg.id).reduce((s,e)=>s+(parseFloat(e.footage)||0),0);
      return {...seg, segDrillDone, segPullDone,
        segPullPct:  segFootage>0?Math.min(100,Math.round(segPullDone/segFootage*100)):0,
        segDrillPct: segFootage>0?Math.min(100,Math.round(segDrillDone/segFootage*100)):0,
        segFootage };
    });

    var pullAvgPerDay = null;
    if(pullLog.length>0) pullAvgPerDay = pullLog.reduce((s,e)=>s+(parseFloat(e.footage)||0),0)/pullLog.length;
    else if(drillLog.length>0) pullAvgPerDay = drillLog.reduce((s,e)=>s+(parseFloat(e.footage)||0),0)/drillLog.length;

    var pullRemaining = Math.max(0,mainlineTotalFt-mainlinePullDone||totalFootage-pullDone);
    var remainingDays=null, updatedEndDate=null;
    if(pullAvgPerDay>0&&pullRemaining>0){
      remainingDays = Math.ceil(pullRemaining/pullAvgPerDay);
      updatedEndDate = formatDate(addWorkdays(new Date(), remainingDays));
    }

    return {
      drillDone, drillPct, pullDone, pullPct,
      drillRemaining: Math.max(0,totalFootage-drillDone),
      pullRemaining,
      pullAvgPerDay: pullAvgPerDay?Math.round(pullAvgPerDay):null,
      remainingDays, updatedEndDate, segmentProgress,
      totalFootage, mainlinePullDone, mainlinePullPct, mainlineTotalFt,
      servicesTotalCount, servicesDoneCount, servicesPct,
      hasServiceSegs
    };
  }

  function getBidRate(job){
    // Contracted rate: total footage / original duration (workdays)
    var totalFt=getTotalFootage(job);
    var dur=parseInt(job.duration)||0;
    if(!totalFt||!dur) return null;
    return totalFt/dur;
  }

  function getActiveForeman(job, date){
    // Returns the foreman active on a given date based on foremanLog handoffs
    var flog=(job.foremanLog||[]).filter(e=>e.date).sort((a,b)=>a.date>b.date?1:-1);
    if(!flog.length) return job.foreman;
    var ds=formatDate(date);
    // Before the first handoff — use the original foreman (fromForeman of first entry)
    if(ds<flog[0].date) return flog[0].fromForeman;
    // Find the last handoff on or before this date
    var active=flog.filter(e=>e.date<=ds);
    return active.length?active[active.length-1].toForeman:flog[0].fromForeman;
  }

  function getEffectiveEndDate(job){
    // For calendar display: paused jobs must STAY on the calendar (far future),
    // active jobs project forward from bid rate.
    // job.endDate is unreliable (pauseJob overwrites it). Use pauseLog as truth.

    var pauseLog=(job.pauseLog||[]).filter(p=>p.pauseDate);
    var openPause=pauseLog.find(p=>!p.resumeDate);

    // Get most recent resume date
    var resolvedPauses=pauseLog.filter(p=>p.resumeDate).sort((a,b)=>a.resumeDate>b.resumeDate?1:-1);
    var lastResumeStr=resolvedPauses.length?resolvedPauses[resolvedPauses.length-1].resumeDate:null;

    // If job has an open pause (currently on hold), cap end date at
    // the LATER of pauseDate or last logged footage date.
    // This ensures days where footage was actually logged still appear
    // even if the pauseDate was entered as an earlier date.
    if(openPause){
      var pauseDt=parseDate(openPause.pauseDate);
      var logDatesP=(job.footageLog||[]).map(function(e){return e.date;}).filter(Boolean).sort();
      var lastLogDtP=logDatesP.length?parseDate(logDatesP[logDatesP.length-1]):null;
      if(pauseDt&&lastLogDtP&&lastLogDtP>pauseDt) return lastLogDtP;
      return pauseDt||parseDate(job.endDate);
    }

    // Job is active — forecast end using bid rate
    var totalFt=getTotalFootage(job);
    var bidRate=getBidRate(job);
    var log=job.footageLog||[];
    var totalLogged=log.reduce((s,e)=>s+(parseFloat(e.footage)||0),0);
    var remaining=Math.max(0,totalFt-totalLogged);

    // Baseline: stored endDate, floored at last resume date
    var storedEnd=parseDate(job.endDate);
    if(lastResumeStr){
      var lastResumeDate=parseDate(lastResumeStr);
      if(!storedEnd||lastResumeDate>storedEnd) storedEnd=lastResumeDate;
    }

    if(!totalFt||!bidRate||remaining===0){
      // Fall back: if no endDate, project using duration field or show for 30 days
      if(storedEnd) return storedEnd;
      var dur=parseInt(job.duration)||30;
      return addWorkdays(parseDate(job.startDate),dur);
    }

    // Project from latest of: startDate, last resumeDate, last log date
    var logDates=log.map(e=>e.date).filter(Boolean).sort();
    var lastLogStr=logDates.length?logDates[logDates.length-1]:null;
    var projectFromStr=job.startDate||'';
    if(lastResumeStr&&lastResumeStr>projectFromStr) projectFromStr=lastResumeStr;
    if(lastLogStr&&lastLogStr>projectFromStr) projectFromStr=lastLogStr;
    if(!projectFromStr) return storedEnd;

    var daysRemaining=Math.ceil(remaining/bidRate);
    var projected=addWorkdays(parseDate(projectFromStr),daysRemaining);
    var projStr=formatDate(projected);
    return (!storedEnd||projStr>formatDate(storedEnd))?projected:storedEnd;
  }


  function getJobPauseState(job, dateOrStr){
    // Returns 'paused' or 'active' for a specific calendar date.
    // Rule: job is ON HOLD on date X if any pause entry has pauseDate < X
    //       AND (no resumeDate set, OR resumeDate > X).
    // pauseDate = last working day before pause. resumeDate = first day back.
    // So: pauseDate itself = active (still working). resumeDate itself = active (back on job).
    // Additionally: any day with logged footage is always active, regardless of pause dates.
    var ds=typeof dateOrStr==='string'?dateOrStr:formatDate(dateOrStr);
    // If footage was actually logged on this date, it's always an active day
    if((job.footageLog||[]).some(function(e){return e.date===ds&&parseFloat(e.footage)>0;})) return 'active';
    var log=job.pauseLog||[];
    for(var i=0;i<log.length;i++){
      var p=log[i];
      if(!p.pauseDate) continue;
      if(ds>p.pauseDate&&(!p.resumeDate||ds<p.resumeDate)) return 'paused';
    }
    return 'active';
  }

  function jobsOnDate(jobs, date){
    if(date.getDay()===0||date.getDay()===6) return [];
    var ds=formatDate(date);
    return jobs.filter(j=>{
      if(!j.startDate) return false;
      if(j.status==='Cancelled') return false;
      var pauseLog=(j.pauseLog||[]).filter(p=>p.pauseDate);
      var isPausedOnDate=pauseLog.some(p=>{
        if(ds<p.pauseDate) return false;
        if(!p.resumeDate) return true;
        return ds<p.resumeDate;
      });
      if(isPausedOnDate){
        return (j.footageLog||[]).some(e=>e.date===ds&&parseFloat(e.footage)>0);
      }
      var openPause=pauseLog.find(p=>!p.resumeDate);
      if(j.status==='On Hold'&&!openPause&&!pauseLog.length){
        return (j.footageLog||[]).some(e=>e.date===ds&&parseFloat(e.footage)>0);
      }
      // Determine end date — try stored, then projected, then duration-based fallback
      var storedEndStr=j.endDate||'';
      var e=storedEndStr?parseDate(storedEndStr):null;
      if(!e) e=getEffectiveEndDate(j);
      if(!e&&j.duration) e=addWorkdays(parseDate(j.startDate),parseInt(j.duration)||1);
      if(!e&&(j.status==='In Progress'||j.status==='Scheduled')){
        // Last resort: show active jobs for 60 days from start
        e=addWorkdays(parseDate(j.startDate),60);
      }
      if(!e) return false;
      var es=formatDate(e);
      return ds>=j.startDate&&ds<=es;
    });
  }

  function hasFootageOnDate(job, date){
    var ds=formatDate(date);
    return (job.footageLog||[]).some(e=>e.date===ds&&parseFloat(e.footage)>0);
  }

  function getFootageOnDate(job, date){
    var ds=formatDate(date);
    return (job.footageLog||[]).filter(e=>e.date===ds&&parseFloat(e.footage)>0).reduce((s,e)=>s+(parseFloat(e.footage)||0),0);
  }

  var defaultSegment = ()=>({
    id:'seg_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
    pipeSize:'', pipeSpec:'', segType:'Mainline', footage:'', pricePerFoot:'', serviceCount:''
  });

  var defaultForm = {
    id:null, jobName:'', client:'', location:'', foreman:'', bidDate:'',
    startDate:'', endDate:'', duration:'', segments:[defaultSegment()],
    status:'Scheduled', notes:'', footageLog:[], pauseLog:[], foremanLog:[], soilType:''
  };

  // ─── TIMECARD TAB ─────────────────────────────────────────────────────────────
  function TimecardTab({ jobs, timecards, saveTimecards, crewRosters, saveCrewRosters, isAdmin, isForeman, activeForeman }) {
    var SPS_PERDIEM = 120;
    var OTHER_PERDIEM = 100;

    // A "session" = one foreman/employee/job combo with multiple day rows
    var emptyRow = function() {
      return { id:'row_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), date:new Date().toISOString().slice(0,10), hoursWorked:'', perDiem:false, overtimeComment:'', notes:'' };
    };
    var emptySession = function(foreman) {
      return { foreman:foreman||'', employeeName:'', jobId:'', jobName:'', contractor:'', rows:[emptyRow()] };
    };

    var [view, setView] = useState('summary');

    var weekOf = function(dateStr){
      if(!dateStr) return '';
      var d = parseDate(dateStr); if(!d) return '';
      var day = d.getDay();
      var mon = new Date(d.getFullYear(), d.getMonth(), d.getDate()-(day===0?6:day-1));
      return formatDate(mon);

    visibleCards.forEach(function(tc){ var w=weekOf(tc.date); if(w&&allWeeks.indexOf(w)<0) allWeeks.push(w); });
    allWeeks.sort().reverse();

    var filtered = visibleCards.filter(function(tc){
      if(filterForeman && tc.foreman!==filterForeman) return false;

      return true;
    }).sort(function(a,b){ return a.date<b.date?1:-1; });

    var weekSummary = function(){
      var byWeek = {};
      visibleCards.forEach(function(tc){
        var w = weekOf(tc.date)||'unknown';
        if(!byWeek[w]) byWeek[w]={week:w,entries:0,hours:0,perDiems:0,perDiemAmt:0};

          u.contractor = job.client||'';

          if(fm){

        })});
      });

        if(next){ next.setDate(next.getDate()+1); }

            )
          )
        )
      );

    // ── MULTI-DAY ENTRY FORM ──
    if(view==='entry'){

      return ce('div',{className:'slide-in'},

            ),

      var runs=b.pipeRuns||[];
      var isSvc=r=>r.segType==='Long Side Service'||r.segType==='Short Side Service';

      var length=runs.filter(r=>!isSvc(r)).reduce((s,r)=>s+(parseFloat(r.length)||0),0);

    var importBids = e=>{
      var file=e.target.files[0]; if(!file) return;
      var isExcel=/\.(xlsx|xls)$/i.test(file.name);
      if(isExcel){
        var xreader=new FileReader();
        xreader.onload=function(evt){
          try{
            var data=new Uint8Array(evt.target.result);
            var wb=XLSX.read(data,{type:'array'});
            var findSheet=function(key){ var n=wb.SheetNames.find(function(s){ return s.toUpperCase().replace(/[^A-Z]/g,'').includes(key); }); return n?wb.Sheets[n]:null; };
            var hdrSheet=findSheet('BIDHEADER')||findSheet('BIDS')||wb.Sheets[wb.SheetNames[0]];
            var runSheet=findSheet('PIPERUN')||findSheet('RUNS')||(wb.SheetNames[1]?wb.Sheets[wb.SheetNames[1]]:null);
            if(!hdrSheet){ showToast('Could not find BID_HEADERS sheet.','error'); return; }
            var hdrRows=XLSX.utils.sheet_to_json(hdrSheet,{defval:'',raw:false});
            var runRows=runSheet?XLSX.utils.sheet_to_json(runSheet,{defval:'',raw:false}):[];
            var nk=function(s){ return String(s||'').toUpperCase().replace(/[^A-Z0-9]/g,''); };
            var gv=function(row,keys){ var rk=Object.keys(row); var match=rk.find(function(k){ return keys.some(function(t){ return nk(k).includes(nk(t)); }); }); return match?String(row[match]||'').trim():''; };
            var normDate=function(s){ if(!s) return ''; var d=new Date(s); if(!isNaN(d)) return d.toISOString().slice(0,10); return s; };
            var runMap={};
            runRows.forEach(function(r){
              var bn=gv(r,['BIDNAME','BID','NAME']); if(!bn) return;
              var key=bn.toUpperCase();
              if(!runMap[key]) runMap[key]=[];
              var segType=gv(r,['SEGTYPE','SEG','TYPE'])||'Mainline';
              var validSeg=['Mainline','Long Side Service','Short Side Service'];
              if(!validSeg.includes(segType)) segType='Mainline';
              runMap[key].push({segType:segType,pipeSize:gv(r,['PIPESIZE','SIZE','PIPE']),pipeSpec:gv(r,['PIPESPEC','SPEC','MATERIAL']),length:gv(r,['LENGTH','FT','FEET']),rate:gv(r,['RATE','RATEPERFT','PERFT']),days:gv(r,['DAYS','DAY','DURATION']),serviceCount:gv(r,['SERVICECOUNT','SERVICES','COUNT'])||'0'});
            });
            var bidUidX=function(){ return Math.random().toString(36).slice(2,10); };
            var newBids=hdrRows.map(function(r){
              var name=gv(r,['BIDNAME','BID','NAME']); if(!name) return null;
              var soilRaw=gv(r,['SOILTYPE','SOIL']).toLowerCase();
              var soilType=soilRaw.includes('rock')?'Rock':soilRaw.includes('dirt')?'Dirt':'';
              var statusRaw=gv(r,['BIDSTATUS','STATUS']).toLowerCase();
              var validStatuses=['draft','submitted','awarded','scheduled','declined','notawarded'];
              var bidStatus=validStatuses.find(function(s){ return statusRaw.includes(s); })||'draft';
              var runs=runMap[name.toUpperCase()]||[{segType:'Mainline',pipeSize:'',pipeSpec:'',length:'',rate:'',days:'',serviceCount:'0'}];
              var totRev=runs.reduce(function(s,rr){ return s+(parseFloat(rr.length)||0)*(parseFloat(rr.rate)||0); },0);
              var totDays=runs.reduce(function(s,rr){ return s+(parseFloat(rr.days)||0); },0);

              return {id:bidUidX(),name:name,num:gv(r,['POJOB','PO','JOB','NUM']),eighty:gv(r,['080','EIGHTY']),contractor:gv(r,['CONTRACTOR','COMPANY','CLIENT']),loc:gv(r,['LOCATION','LOC','ADDRESS']),owner:gv(r,['OWNER','OWNERNAME']),ownerJobNum:gv(r,['OWNERJOBNUM','OWNERJOB','OWNERNUM']),soilType:soilType,submitDate:normDate(gv(r,['SUBMITDATE','SUBMIT','DATE'])),service:gv(r,['SERVICE','SERVICETYPE']),bidStatus:bidStatus,notes:gv(r,['NOTES','NOTE','COMMENTS']),pipeRuns:runs,revenue:Math.round(totRev),weeklyRev:weeklyRev};
            }).filter(Boolean);
            if(!newBids.length){ showToast('No valid bids found in file.','error'); return; }
            setBids(function(prev){
              var existing=new Set(prev.map(function(b){ return (b.name+'|'+b.contractor).toUpperCase(); }));

    var handleImportFile = e=>{

        try{
          var data=new Uint8Array(evt.target.result);
          var workbook=XLSX.read(data,{type:'array'});
          var sheet=workbook.Sheets[workbook.SheetNames[0]];
          var rows=XLSX.utils.sheet_to_json(sheet,{defval:''});
          if(!rows.length){ setImportError('No data found in sheet.'); setImportLoading(false); return; }
          var colMap=row=>{
            var k=name=>{ var keys=Object.keys(row); var match=keys.find(k=>k.toLowerCase().replace(/[^a-z0-9]/g,'').includes(name.toLowerCase().replace(/[^a-z0-9]/g,''))); return match?String(row[match]||'').trim():''; };
            var sl=(k('status')||'').toLowerCase();
            var status=sl.includes('won')||sl.includes('awarded')?'Scheduled':sl.includes('lost')||sl.includes('cancel')?'Cancelled':sl.includes('progress')?'In Progress':sl.includes('hold')?'On Hold':sl.includes('complete')?'Completed':'Scheduled';
