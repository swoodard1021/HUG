<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hunter Underground — HDD Job Scheduler</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0b0e13; color: #d0d8e4; font-family: 'Rajdhani', sans-serif; min-height: 100vh; overflow-x: hidden; }
    input, select, textarea { background: #131820; border: 1px solid #2a3548; border-radius: 4px; color: #d0d8e4; padding: 8px 10px; font-family: 'Rajdhani', sans-serif; font-size: 14px; width: 100%; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: #2d7dd2; }
    select option { background: #131820; }
    .btn { cursor: pointer; border: none; border-radius: 4px; font-family: 'Rajdhani', sans-serif; font-weight: 600; transition: all .15s; }
    .btn:hover { filter: brightness(1.2); }
    .cal-cell:hover { background: #151e2a !important; }
    .pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }
    .slide-in { animation: slideIn .25s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateY(-10px);} to{opacity:1;transform:translateY(0);} }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #2d7dd2; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
(function() {
  var React = window.React;
  var ReactDOM = window.ReactDOM;
  var { useState, useEffect, useRef, useCallback } = React;

  // ─── CONSTANTS ───────────────────────────────────────────────────────────────
  var PIPE_SIZES = ['3/4"','1 1/4"','2"','3"','4"','6"','8"','10"','12"','16"','20"','24"','Other'];
  var PIPE_SPECS = ['HDPE','PVC','Steel Casing','HDPE Casing'];
  var RIG_NUMBERS = ['BR-003','BR-004','BR-005','BR-006','BR-007'];
  var BORE_NUMBERS = Array.from({length:50},(_,i)=>String(i+1));
  var FOREMEN = ['Jason','Jeff','Hugo','Gerardo','Roberto','Uriel'];
  var CLIENT_OPTIONS = ['SPS','TAD','PAN','BOB','TSU'];
  var SEG_TYPES = ['Mainline','Long Side Service','Short Side Service'];
  var STATUS_OPTIONS = ['Scheduled','In Progress','Completed','On Hold','Cancelled'];

  var FOREMAN_COLORS = {
    'Jason':   { bg:'#1a1a3a', border:'#6c63ff', text:'#b8b5ff' },
    'Jeff':    { bg:'#1a2e1a', border:'#22c55e', text:'#86efac' },
    'Hugo':    { bg:'#2e1a1a', border:'#ef4444', text:'#fca5a5' },
    'Gerardo': { bg:'#1a1a1a', border:'#ffffff', text:'#ffffff' },
    'Roberto': { bg:'#1a2a2e', border:'#06b6d4', text:'#67e8f9' },
    'Uriel':   { bg:'#2a2a1a', border:'#f59e0b', text:'#fcd34d' }
  };
  var DEFAULT_FC = { bg:'#1a3a5c', border:'#2d7dd2', text:'#7ec8f7' };
  function getForemanColor(f){ return FOREMAN_COLORS[f]||DEFAULT_FC; }

  var STATUS_COLORS = {
    'Scheduled':  { bg:'#1a3a5c', border:'#2d7dd2', text:'#7ec8f7' },
    'In Progress':{ bg:'#1a3a1a', border:'#2dbd4e', text:'#7affa0' },
    'Completed':  { bg:'#2a2a2a', border:'#888',    text:'#ccc'    },
    'On Hold':    { bg:'#3a2e0a', border:'#e6a817', text:'#ffd166' },
    'Cancelled':  { bg:'#3a0a0a', border:'#c0392b', text:'#ff8a80' }
  };

  var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  var BID_STATUSES = ['draft','submitted','awarded','scheduled','declined','notawarded'];
  var BID_STATUS_CFG = {
    draft:      { label:'DRAFT',       bg:'#1a2840', border:'#2d7dd2', text:'#7ec8f7'  },
    submitted:  { label:'SUBMITTED',   bg:'#2a1a40', border:'#8b5cf6', text:'#c4b5fd'  },
    awarded:    { label:'AWARDED',     bg:'#0a2a0a', border:'#22c55e', text:'#86efac'  },
    scheduled:  { label:'SCHEDULED ✓', bg:'#0a1a2a', border:'#06b6d4', text:'#67e8f9'  },
    declined:   { label:'DECLINED',    bg:'#2a0a0a', border:'#ef4444', text:'#fca5a5'  },
    notawarded: { label:'NOT AWARDED', bg:'#1a1a1a', border:'#555',    text:'#999'     }
  };

  // ─── HELPERS ─────────────────────────────────────────────────────────────────
  function generateId(){ return 'job_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); }
  function bidUid(){     return 'bid_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); }

  function parseDate(str){
    if(!str) return null;
    var d = new Date(str+'T12:00:00');
    return isNaN(d)?null:d;
  }
  function formatDate(d){ return d?d.toISOString().slice(0,10):''; }

  function addWorkdays(date, days){
    var d = new Date(date);
    while(d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()+1);
    var remaining = parseInt(days)-1;
    while(remaining>0){ d.setDate(d.getDate()+1); var dow=d.getDay(); if(dow!==0&&dow!==6) remaining--; }
    return d;
  }
  function countWorkdays(start,end){
    var count=0, d=new Date(start);
    while(d<=end){ var dow=d.getDay(); if(dow!==0&&dow!==6) count++; d.setDate(d.getDate()+1); }
    return count;
  }
  function calcEndDate(startDate, duration){
    if(!startDate||!duration) return null;
    var start = parseDate(startDate);
    if(!start) return null;
    return addWorkdays(start, parseInt(duration));
  }

  var isServiceSeg = seg => seg.segType==='Long Side Service'||seg.segType==='Short Side Service';

  function getTotalFootage(job){
    if(job.segments&&job.segments.length>0)
      return job.segments.reduce((s,seg)=>s+(parseFloat(seg.footage)||0),0);
    return parseFloat(job.footage)||0;
  }
  function getTotalRevenue(job){
    if(job.segments&&job.segments.length>0)
      return job.segments.reduce((s,seg)=>{
        if(isServiceSeg(seg)) return s+(parseInt(seg.serviceCount)||0)*(parseFloat(seg.pricePerFoot)||0);
        return s+(parseFloat(seg.footage)||0)*(parseFloat(seg.pricePerFoot)||0);
      },0);
    return (parseFloat(job.footage)||0)*(parseFloat(job.pricePerFoot)||0);
  }

  function calcPausedWorkdays(pauseLog){
    if(!pauseLog||!pauseLog.length) return 0;
    return pauseLog.reduce((total,p)=>{
      if(p.pauseDate&&p.resumeDate){
        var s=new Date(p.pauseDate+'T12:00:00'), e=new Date(p.resumeDate+'T12:00:00');
        if(e>s) total+=countWorkdays(s,e)-1;
      }
      return total;
    },0);
  }

  function calcJobProgress(job){
    var totalFootage = getTotalFootage(job);
    var log = job.footageLog||[];
    var drillLog = log.filter(e=>e.operation==='drill');
    var pullLog  = log.filter(e=>!e.operation||e.operation==='pull');
    var drillDone = drillLog.reduce((s,e)=>s+(parseFloat(e.footage)||0),0);
    var pullDone  = pullLog.reduce((s,e)=>s+(parseFloat(e.footage)||0),0);
    var drillPct = totalFootage>0?Math.min(100,Math.round(drillDone/totalFootage*100)):0;
    var pullPct  = totalFootage>0?Math.min(100,Math.round(pullDone/totalFootage*100)):0;

    var segs = job.segments||[];
    var mainlineSegs = segs.filter(s=>!isServiceSeg(s));
    var serviceSegs  = segs.filter(s=>isServiceSeg(s));
    var mainlineTotalFt = mainlineSegs.reduce((a,s)=>a+(parseFloat(s.footage)||0),0);
    var hasServiceSegs  = serviceSegs.length>0;
    var mainlineSegIds  = new Set(mainlineSegs.map(s=>s.id));
    var serviceSegIds   = new Set(serviceSegs.map(s=>s.id));

    var servicesTotalCount = serviceSegs.reduce((a,s)=>a+(parseInt(s.serviceCount)||0),0);
    var servicesDoneCount  = pullLog.filter(e=>serviceSegIds.has(e.segmentId)).reduce((a,e)=>a+(parseInt(e.serviceCount)||1),0);
    var servicesPct = servicesTotalCount>0?Math.min(100,Math.round(servicesDoneCount/servicesTotalCount*100)):0;

    var mainlinePullDone = 0;
    pullLog.forEach(e=>{
      var ft=parseFloat(e.footage)||0;
      if(mainlineSegIds.has(e.segmentId)) mainlinePullDone+=ft;
      else if(!e.segmentId&&!hasServiceSegs) mainlinePullDone+=ft;
    });
    var mainlinePullPct = mainlineTotalFt>0?Math.min(100,Math.round(mainlinePullDone/mainlineTotalFt*100)):0;

    var segmentProgress = segs.map(seg=>{
      var segFootage = parseFloat(seg.footage)||0;
      var segPullDone  = pullLog.filter(e=>e.segmentId===seg.id).reduce((s,e)=>s+(parseFloat(e.footage)||0),0);
      var segDrillDone = drillLog.filter(e=>e.segmentId===seg.id).reduce((s,e)=>s+(parseFloat(e.footage)||0),0);
      return {...seg, segDrillDone, segPullDone,
        segPullPct:  segFootage>0?Math.min(100,Math.round(segPullDone/segFootage*100)):0,
        segDrillPct: segFootage>0?Math.min(100,Math.round(segDrillDone/segFootage*100)):0,
        segFootage };
    });

    var pullAvgPerDay = null;
    if(pullLog.length>0) pullAvgPerDay = pullLog.reduce((s,e)=>s+(parseFloat(e.footage)||0),0)/pullLog.length;
    else if(drillLog.length>0) pullAvgPerDay = drillLog.reduce((s,e)=>s+(parseFloat(e.footage)||0),0)/drillLog.length;

    var pullRemaining = Math.max(0,mainlineTotalFt-mainlinePullDone||totalFootage-pullDone);
    var remainingDays=null, updatedEndDate=null;
    if(pullAvgPerDay>0&&pullRemaining>0){
      remainingDays = Math.ceil(pullRemaining/pullAvgPerDay);
      updatedEndDate = formatDate(addWorkdays(new Date(), remainingDays));
    }

    return {
      drillDone, drillPct, pullDone, pullPct,
      drillRemaining: Math.max(0,totalFootage-drillDone),
      pullRemaining,
      pullAvgPerDay: pullAvgPerDay?Math.round(pullAvgPerDay):null,
      remainingDays, updatedEndDate, segmentProgress,
      totalFootage, mainlinePullDone, mainlinePullPct, mainlineTotalFt,
      servicesTotalCount, servicesDoneCount, servicesPct,
      hasServiceSegs
    };
  }

  function jobsOnDate(jobs, date){
    if(date.getDay()===0||date.getDay()===6) return [];
    return jobs.filter(j=>{
      var s=parseDate(j.startDate), e=parseDate(j.endDate);
      if(!s||!e) return false;
      return date>=s&&date<=e;
    });
  }

  var defaultSegment = ()=>({
    id:'seg_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
    pipeSize:'', pipeSpec:'', segType:'Mainline', footage:'', pricePerFoot:'', serviceCount:''
  });

  var defaultForm = {
    id:null, jobName:'', client:'', location:'', foreman:'', bidDate:'',
    startDate:'', endDate:'', duration:'', segments:[defaultSegment()],
    status:'Scheduled', notes:'', footageLog:[], pauseLog:[], soilType:''
  };

  // ─── BID TAB ──────────────────────────────────────────────────────────────────
  function BidTab({ onPromote, bids, setBids }) {
    var [weeklyGoal, setWeeklyGoal] = useState(()=>parseFloat(localStorage.getItem('hdd_goal')||'0'));
    var [showForm, setShowForm] = useState(false);
    var [editBid, setEditBid] = useState(null);
    var [filter, setFilter] = useState('all');
    var [search, setSearch] = useState('');

    var saveBids = next=>{ setBids(next); localStorage.setItem('hdd_bids',JSON.stringify(next)); };

    var emptyBid = ()=>({
      id:bidUid(), name:'', num:'', eighty:'', loc:'', contractor:'',
      submitDate:'', soilType:'', bidStatus:'draft', service:'',
      pipeRuns:[{segType:'Mainline',pipeSize:'',pipeSpec:'',length:'',rate:'',days:'',serviceCount:''}],
      created: new Date().toISOString().slice(0,10)
    });
    var [form, setForm] = useState(emptyBid);

    var openNew = ()=>{ setForm(emptyBid()); setEditBid(null); setShowForm(true); };
    var openEdit = b=>{ setForm({...b, pipeRuns: b.pipeRuns?.length ? b.pipeRuns.map(r=>({...r})) : [{segType:'Mainline',pipeSize:'',pipeSpec:'',length:'',rate:'',days:'',serviceCount:''}]}); setEditBid(b.id); setShowForm(true); };
    var hf = (f,v) => setForm(p=>({...p,[f]:v}));
    var hr = (i,f,v) => setForm(p=>({...p, pipeRuns: p.pipeRuns.map((r,ri)=>ri===i?{...r,[f]:v}:r)}));
    var addRun = ()=> setForm(p=>({...p, pipeRuns:[...p.pipeRuns,{segType:'Mainline',pipeSize:'',pipeSpec:'',length:'',rate:'',days:'',serviceCount:''}]}));
    var removeRun = i=> setForm(p=>({...p, pipeRuns:p.pipeRuns.filter((_,ri)=>ri!==i)}));

    var calcBidTotals = b=>{
      var runs=b.pipeRuns||[];
      var isSvc=r=>r.segType==='Long Side Service'||r.segType==='Short Side Service';
      var revenue=runs.reduce((s,r)=>isSvc(r)?s+(parseFloat(r.serviceCount)||0)*(parseFloat(r.rate)||0):s+(parseFloat(r.length)||0)*(parseFloat(r.rate)||0),0);
      var days=runs.reduce((s,r)=>s+(parseFloat(r.days)||0),0);
      var length=runs.filter(r=>!isSvc(r)).reduce((s,r)=>s+(parseFloat(r.length)||0),0);
      return { revenue, days, length, weeklyRev: days>0?revenue/days*5:0 };
    };

    var saveBidForm = ()=>{
      if(!form.name.trim()) return;
      var totals=calcBidTotals(form);
      var updated={...form,...totals};
      if(editBid) saveBids(bids.map(b=>b.id===editBid?updated:b));
      else saveBids([...bids,updated]);
      setShowForm(false);
    };

    var deleteBid = id=>{ if(!confirm('Delete this bid?')) return; saveBids(bids.filter(b=>b.id!==id)); };
    var updateStatus = (id,status)=> saveBids(bids.map(b=>b.id===id?{...b,bidStatus:status}:b));
    var markScheduled = id=> saveBids(bids.map(b=>b.id===id?{...b,bidStatus:'scheduled'}:b));
    var saveGoal = v=>{ var g=parseFloat(v)||0; setWeeklyGoal(g); localStorage.setItem('hdd_goal',String(g)); };

    var filtered = bids.filter(b=>{
      var ok = filter==='all'||b.bidStatus===filter;
      var q=search.toLowerCase();
      return ok&&(!q||(b.name||'').toLowerCase().includes(q)||(b.num||'').toLowerCase().includes(q)||(b.contractor||'').toLowerCase().includes(q)||(b.loc||'').toLowerCase().includes(q));
    });

    var awardedRev = bids.filter(b=>b.bidStatus==='awarded').reduce((s,b)=>s+(b.revenue||0),0);
    var weeklyActual = bids.filter(b=>b.bidStatus==='awarded').reduce((s,b)=>s+(b.weeklyRev||0),0);
    var totalRevenue = bids.filter(b=>b.bidStatus!=='declined'&&b.bidStatus!=='notawarded').reduce((s,b)=>s+(b.revenue||0),0);
    var denominator = bids.filter(b=>['awarded','notawarded','declined'].includes(b.bidStatus)).length;
    var winRate = denominator>0?Math.round(bids.filter(b=>b.bidStatus==='awarded').length/denominator*100):0;

    var INP = {background:'#0d1117',border:'1px solid #2a3548',borderRadius:4,color:'#d0d8e4',padding:'8px 10px',fontFamily:'inherit',fontSize:14,width:'100%',outline:'none',boxSizing:'border-box'};

    var ce = React.createElement;
    return ce('div',{className:'slide-in'},
      // Stats row
      ce('div',{style:{display:'flex',gap:20,marginBottom:20,flexWrap:'wrap'}},
        [{label:'TOTAL BIDS',val:bids.length},{label:'AWARDED',val:bids.filter(b=>b.bidStatus==='awarded').length},{label:'WIN RATE',val:winRate+'%'},{label:'AWARDED REV',val:'$'+awardedRev.toLocaleString(void 0,{maximumFractionDigits:0})},{label:'PIPELINE REV',val:'$'+totalRevenue.toLocaleString(void 0,{maximumFractionDigits:0})}].map(s=>
          ce('div',{key:s.label,style:{background:'#0d1117',border:'1px solid #1a2840',borderRadius:6,padding:'10px 18px',minWidth:110}},
            ce('div',{style:{fontSize:18,fontWeight:700,color:'#2d7dd2',lineHeight:1}},s.val),
            ce('div',{style:{fontSize:10,color:'#4a6fa5',letterSpacing:2,marginTop:3}},s.label)
          )
        ),
      ),
      // Toolbar
      ce('div',{style:{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}},
        ce('input',{type:'text',placeholder:'🔍 Search bids…',value:search,onChange:e=>setSearch(e.target.value),style:{...INP,width:200,fontSize:13}}),
        ce('div',{style:{display:'flex',gap:4,flexWrap:'wrap'}},
          [['all','ALL'],...BID_STATUSES.map(s=>[s,BID_STATUS_CFG[s].label])].map(([val,lbl])=>
            ce('button',{key:val,className:'btn',onClick:()=>setFilter(val),style:{padding:'6px 12px',fontSize:11,letterSpacing:1,fontWeight:700,background:filter===val?'#1a2840':'#0a0f18',border:`1px solid ${filter===val?'#2d7dd2':'#2a3548'}`,color:filter===val?'#7ec8f7':'#4a6fa5'}},lbl)
          )
        ),
        ce('button',{className:'btn',onClick:openNew,style:{marginLeft:'auto',background:'#2d7dd2',color:'#fff',padding:'8px 20px',fontSize:13,letterSpacing:1}},'+ NEW BID')
      ),
      // Bid list
      filtered.length===0&&ce('div',{style:{textAlign:'center',padding:60,color:'#2a3548',fontSize:16,letterSpacing:2}},bids.length===0?'NO BIDS YET — ADD YOUR FIRST BID':'NO MATCHING BIDS'),
      ce('div',{style:{display:'flex',flexDirection:'column',gap:8}},
        filtered.map(bid=>{
          var sc=BID_STATUS_CFG[bid.bidStatus]||BID_STATUS_CFG.draft;
          var totals=calcBidTotals(bid);
          var isSvc=r=>r.segType==='Long Side Service'||r.segType==='Short Side Service';
          return ce('div',{key:bid.id,style:{background:'#0f1520',border:`1px solid ${sc.border}`,borderLeft:`4px solid ${sc.border}`,borderRadius:6,padding:'14px 18px'}},
            ce('div',{style:{display:'flex',gap:16,alignItems:'flex-start',flexWrap:'wrap'}},
              ce('div',{style:{flex:'1 1 200px',minWidth:180}},
                ce('div',{style:{fontWeight:700,fontSize:16,color:'#fff',letterSpacing:1}},bid.name||'Untitled Bid'),
                bid.num&&ce('div',{style:{fontSize:11,color:'#4a6fa5',fontFamily:"'Share Tech Mono',monospace"}},'PO/Job# '+bid.num),
                bid.eighty&&ce('div',{style:{fontSize:11,color:'#4a6fa5',fontFamily:"'Share Tech Mono',monospace"}},'080# '+bid.eighty),
                bid.contractor&&ce('div',{style:{fontSize:12,color:'#7ec8f7',marginTop:2}},bid.contractor),
                bid.loc&&ce('div',{style:{fontSize:11,color:'#4a6fa5'}},bid.loc),
                bid.soilType&&ce('div',{style:{display:'inline-block',marginTop:4,fontSize:10,fontWeight:700,letterSpacing:1,padding:'2px 8px',borderRadius:3,background:bid.soilType==='Rock'?'#7c3b1e':'#1a2e1a',border:`1px solid ${bid.soilType==='Rock'?'#f97316':'#22c55e'}`,color:bid.soilType==='Rock'?'#fed7aa':'#86efac'}},bid.soilType==='Rock'?'🪨 ROCK':'🟤 DIRT'),
                bid.submitDate&&ce('div',{style:{fontSize:10,color:'#ffd166',marginTop:4}},'📅 Submit: '+bid.submitDate)
              ),
              ce('div',{style:{flex:'1 1 200px',minWidth:160}},
                (()=>{
                  // Sort runs: highest $/ft (or $/svc) first
                  var runs=[...(bid.pipeRuns||[])].filter(r=>r.length||r.serviceCount);
                  runs.sort((a,b)=>(parseFloat(b.rate)||0)-(parseFloat(a.rate)||0));
                  return runs.map((r,i)=>{
                    var sv=isSvc(r);
                    return ce('div',{key:i,style:{fontSize:11,color:sv?'#c4b5fd':'#d0d8e4',fontFamily:"'Share Tech Mono',monospace",marginBottom:3}},
                      sv?(r.segType==='Long Side Service'?'🔌 LONG':'🔌 SHORT'):'⛏ ',
                      sv?`${r.serviceCount||0} svcs${r.rate?` · $${parseFloat(r.rate).toFixed(2)}/svc`:''}`:
                        `${Number(r.length).toLocaleString()} ft${r.pipeSize?` · ${r.pipeSize}`:''}${r.pipeSpec?` ${r.pipeSpec}`:''}${r.rate?` · $${parseFloat(r.rate).toFixed(2)}/ft`:''}`
                    );
                  });
                })(),
                totals.days>0&&ce('div',{style:{fontSize:14,fontWeight:700,color:'#7ec8f7',marginTop:8,letterSpacing:0.5}},
                  ce('span',{style:{fontSize:10,color:'#4a6fa5',fontWeight:400,letterSpacing:2,marginRight:6,fontFamily:"'Rajdhani',sans-serif"}},'DAYS TO COMPLETE'),
                  totals.days
                )
              ),
              ce('div',{style:{flex:'0 0 140px',textAlign:'center'}},
                ce('div',{style:{fontSize:18,fontWeight:700,color:'#7affa0'}},totals.revenue>0?'$'+totals.revenue.toLocaleString(void 0,{maximumFractionDigits:0}):'—'),
                ce('div',{style:{fontSize:10,color:'#4a6fa5',letterSpacing:1,marginBottom:6}},'TOTAL REV'),
                // Revenue breakdown
                (()=>{
                  var runs=bid.pipeRuns||[];
                  var mlRev=runs.filter(r=>!isSvc(r)).reduce((s,r)=>s+(parseFloat(r.length)||0)*(parseFloat(r.rate)||0),0);
                  var svcRev=runs.filter(r=>isSvc(r)).reduce((s,r)=>s+(parseFloat(r.serviceCount)||0)*(parseFloat(r.rate)||0),0);
                  return (mlRev>0||svcRev>0)?ce('div',{style:{borderTop:'1px solid #1a2840',paddingTop:6,display:'flex',flexDirection:'column',gap:3}},
                    mlRev>0&&ce('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:10}},
                      ce('span',{style:{color:'#4a6fa5',letterSpacing:1}},'⛏ MAINLINE'),
                      ce('span',{style:{color:'#7ec8f7',fontWeight:700,fontFamily:"'Share Tech Mono',monospace"}},'$'+mlRev.toLocaleString(void 0,{maximumFractionDigits:0}))
                    ),
                    svcRev>0&&ce('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:10}},

  function HDDCalendar() {
    var [jobs, setJobs] = useState([]);
    var [bids, setBids] = useState(()=>{ try{ return JSON.parse(localStorage.getItem('hdd_bids')||'[]')||[]; }catch(e){ return []; } });
    var [view, setView] = useState('calendar');
    var [calMode, setCalMode] = useState('month');
    var [currentDate, setCurrentDate] = useState(new Date());
    var [showModal, setShowModal] = useState(false);
    var [form, setForm] = useState(defaultForm);
    var [selectedJob, setSelectedJob] = useState(null);
    var [toast, setToast] = useState(null);
    var [activeTab, setActiveTab] = useState('schedule');
    var [saveStatus, setSaveStatus] = useState('');
    var [listening, setListening] = useState(false);
    var [transcript, setTranscript] = useState('');
    var [voiceStatus, setVoiceStatus] = useState('');
    var recognitionRef = useRef(null);
    var voiceInputRef = useRef(null);

    // Progress modal
    var [showProgressModal, setShowProgressModal] = useState(false);
    var [progressJob, setProgressJob] = useState(null);
    var [logEntry, setLogEntry] = useState({date:new Date().toISOString().slice(0,10),operation:'pull',logType:'mainline',rig:'',bore:'',footage:'',notes:'',streetNumber:'',streetName:'',serviceCount:1});
    var [editingEntryId, setEditingEntryId] = useState(null);
    var [editEntryData, setEditEntryData] = useState({});

    // Pause modal
    var [showPauseModal, setShowPauseModal] = useState(false);
    var [pauseModalJob, setPauseModalJob] = useState(null);
    var [pauseDate, setPauseDate] = useState('');
    var [resumeDate, setResumeDate] = useState('');

    // Import modal
    var [showImportModal, setShowImportModal] = useState(false);
    var [importPreview, setImportPreview] = useState([]);
    var [importError, setImportError] = useState('');
    var [importLoading, setImportLoading] = useState(false);
    var importFileRef = useRef(null);

    // Load/save jobs
    useEffect(()=>{
      try{
        var saved=localStorage.getItem('hunter_underground_jobs');
        if(saved){
          var parsed=JSON.parse(saved);
          setJobs(parsed.map(j=>({...j,segments:(j.segments||[]).map(s=>({...s,segType:s.segType||'Mainline'}))})));
        }
      }catch(e){}
    },[]);

    useEffect(()=>{
      try{ localStorage.setItem('hunter_underground_jobs',JSON.stringify(jobs)); setSaveStatus('SAVED'); var t=setTimeout(()=>setSaveStatus(''),2000); return ()=>clearTimeout(t); }
      catch(e){ setSaveStatus('SAVE FAILED'); }
    },[jobs]);

    var showToast = (msg,type='success')=>{ setToast({msg,type}); setTimeout(()=>setToast(null),3500); };

    // Voice command handler
    var processVoiceCommand = useCallback(text=>{
      var t=text.toLowerCase();
      setVoiceStatus('Processing: "'+text+'"');
      if(t.includes('add job')||t.includes('new job')||t.includes('create job')){ setForm({...defaultForm,id:null}); setShowModal(true); setVoiceStatus('Opening new job form…'); return; }
      if(t.includes('show list')||t.includes('list view')){ setView('list'); setVoiceStatus('Switched to list view.'); return; }
      if(t.includes('show calendar')||t.includes('calendar view')){ setView('calendar'); setVoiceStatus('Switched to calendar view.'); return; }
      if(t.includes('next month')){ setCurrentDate(d=>new Date(d.getFullYear(),d.getMonth()+1,1)); setVoiceStatus('Moved to next month.'); return; }
      if(t.includes('previous month')||t.includes('last month')){ setCurrentDate(d=>new Date(d.getFullYear(),d.getMonth()-1,1)); setVoiceStatus('Moved to previous month.'); return; }
      if(t.includes('today')){ setCurrentDate(new Date()); setVoiceStatus('Jumped to today.'); return; }
      setVoiceStatus('Command not recognized. Try: "add job", "next month", "show list".');
    },[]);

    var isMobile = ()=>/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    var toggleVoice = ()=>{
      if(isMobile()){ if(voiceInputRef.current){ voiceInputRef.current.value=''; voiceInputRef.current.focus(); setListening(true); setTranscript(''); setVoiceStatus('Tap the mic on your keyboard…'); } return; }
      if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){ setVoiceStatus('Voice not supported — try Chrome or Edge.'); return; }
      if(listening){ recognitionRef.current?.stop(); setListening(false); return; }
      var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      var r=new SR(); r.lang='en-US'; r.interimResults=true; r.continuous=false;
      r.onresult=e=>{ var interim=Array.from(e.results).map(x=>x[0].transcript).join(''); setTranscript(interim); if(e.results[e.results.length-1].isFinal) processVoiceCommand(interim); };
      r.onend=()=>setListening(false);
      r.onerror=e=>{ setVoiceStatus('Mic error: '+e.error); setListening(false); };
      recognitionRef.current=r; r.start(); setListening(true); setTranscript(''); setVoiceStatus('Listening…');
    };
    var handleVoiceInput = e=>{ var val=e.target.value.trim(); if(!val) return; setTranscript(val); setListening(false); processVoiceCommand(val); e.target.value=''; e.target.blur(); };

    // Form helpers
    var handleFormChange = (field,val)=>{
      setForm(f=>{
        var u={...f,[field]:val};
        if((field==='startDate'||field==='duration')&&u.startDate&&u.duration){ var end=calcEndDate(u.startDate,u.duration); if(end) u.endDate=formatDate(end); }
        if(field==='endDate'&&u.startDate&&u.endDate){ var s=parseDate(u.startDate),e=parseDate(u.endDate); if(s&&e&&e>=s) u.duration=String(countWorkdays(s,e)); }
        return u;
      });
    };

    var saveJob = ()=>{
      if(!form.jobName||!form.startDate||!form.endDate){ showToast('Job name, start & end dates are required.','error'); return; }
      if(form.id){ setJobs(js=>js.map(j=>j.id===form.id?{...form}:j)); showToast('Job updated!'); }
      else { setJobs(js=>[...js,{...form,id:generateId()}]); showToast('Job added!'); }
      setShowModal(false); setForm(defaultForm);
    };
    var deleteJob = id=>{ setJobs(js=>js.filter(j=>j.id!==id)); setSelectedJob(null); showToast('Job deleted.','error'); };
    var openEdit = job=>{ var segments=job.segments&&job.segments.length>0?job.segments:job.footage?[{id:'seg_legacy_'+job.id,pipeSize:job.pipeSize||'',pipeSpec:job.pipeSpec||'',footage:job.footage,pricePerFoot:job.pricePerFoot||'',segType:'Mainline'}]:[defaultSegment()]; setForm({...job,segments}); setSelectedJob(null); setShowModal(true); };

    // Progress / log
    var openProgress = job=>{ setProgressJob(job); setLogEntry({date:new Date().toISOString().slice(0,10),operation:'pull',logType:'mainline',rig:'',bore:'',footage:'',notes:'',streetNumber:'',streetName:'',serviceCount:1,segmentId:''}); setShowProgressModal(true); };

    var saveLogEntry = ()=>{
      var selectedSeg=(progressJob.segments||[]).find(s=>s.id===logEntry.segmentId);
      var entryIsService=selectedSeg&&isServiceSeg(selectedSeg);
      if(!logEntry.date){ showToast('Date is required.','error'); return; }
      if(!entryIsService&&!logEntry.footage){ showToast('Date and footage are required.','error'); return; }
      var entryToSave=entryIsService?{...logEntry,operation:'pull',footage:'',serviceCount:parseInt(logEntry.serviceCount)||1,id:generateId()}:{...logEntry,id:generateId()};
      var updatedJob={...progressJob,footageLog:[...progressJob.footageLog||[],entryToSave]};
      if(updatedJob.status==='Scheduled') updatedJob.status='In Progress';
      var prog=calcJobProgress(updatedJob);
      if(prog.servicesPct>=100&&prog.mainlinePullPct>=100&&(prog.servicesTotalCount>0||prog.mainlineTotalFt>0)) updatedJob.status='Completed';
      if(prog.updatedEndDate&&updatedJob.startDate){ updatedJob.endDate=prog.updatedEndDate; var s=parseDate(updatedJob.startDate),e=parseDate(prog.updatedEndDate); if(s&&e&&e>=s) updatedJob.duration=String(countWorkdays(s,e)); }
      setJobs(js=>js.map(j=>j.id===updatedJob.id?updatedJob:j));
      setProgressJob(updatedJob);
      setLogEntry({date:new Date().toISOString().slice(0,10),operation:'pull',logType:logEntry.logType,rig:logEntry.rig,bore:logEntry.bore,footage:'',serviceCount:1,segmentId:logEntry.segmentId,notes:'',streetNumber:'',streetName:''});
      showToast(entryIsService?`🔌 ${parseInt(logEntry.serviceCount)||1} service(s) logged!`:`🔧 Footage logged!${prog.updatedEndDate?' · Est. end: '+prog.updatedEndDate:''}`);
    };

    var deleteLogEntry = (jobId,entryId)=>{
      setJobs(js=>js.map(j=>j.id!==jobId?j:{...j,footageLog:(j.footageLog||[]).filter(e=>e.id!==entryId)}));
      setProgressJob(prev=>({...prev,footageLog:(prev.footageLog||[]).filter(e=>e.id!==entryId)}));
      showToast('Entry removed.','error');
    };
    var startEditEntry = entry=>{ setEditingEntryId(entry.id); setEditEntryData({...entry}); };
    var cancelEditEntry = ()=>{ setEditingEntryId(null); setEditEntryData({}); };
    var saveEditEntry = ()=>{
      var editSeg=(progressJob.segments||[]).find(s=>s.id===editEntryData.segmentId);
      var editIsService=editSeg&&isServiceSeg(editSeg);
      if(!editEntryData.date){ showToast('Date is required.','error'); return; }
      if(!editIsService&&!editEntryData.footage){ showToast('Footage is required.','error'); return; }
      var updatedJob={...progressJob,footageLog:(progressJob.footageLog||[]).map(e=>e.id===editingEntryId?{...editEntryData}:e)};
      var prog=calcJobProgress(updatedJob);

        ce('div',{className:'slide-in',onClick:e=>e.stopPropagation(),style:{background:'#0f1520',border:`1px solid ${pauseModalJob.status==='On Hold'?'#2dbd4e':'#e6a817'}`,borderRadius:8,padding:28,width:440,maxWidth:'95vw'}},
          ce('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}},
            ce('div',null,ce('div',{style:{fontSize:18,fontWeight:700,color:'#fff',letterSpacing:1}},pauseModalJob.jobName),ce('div',{style:{fontSize:12,color:'#4a6fa5'}},pauseModalJob.status==='On Hold'?'RESUME JOB':'PAUSE JOB')),
            ce('button',{className:'btn',onClick:()=>setShowPauseModal(false),style:{background:'transparent',color:'#4a6fa5',fontSize:20,padding:'0 6px'}},'✕')

              ce('div',{style:{background:'#0d1b2a',border:'1px solid #1a2840',borderRadius:4,padding:'10px 14px',marginBottom:16,fontSize:11,color:'#7ec8f7'}},'💡 The end date will automatically shift forward by the number of workdays the job was paused.'),

              ce('div',{style:{marginBottom:16}},ce('div',{style:{fontSize:10,color:'#4a6fa5',letterSpacing:2,marginBottom:6}},'PAUSE DATE'),ce('input',{type:'date',value:pauseDate,onChange:e=>setPauseDate(e.target.value),style:{...INP,colorScheme:'dark'}})),

              ce('button',{className:'btn',onClick:pauseJob,style:{width:'100%',background:'#3a2e0a',border:'1px solid #e6a817',color:'#ffd166',padding:'12px',fontSize:14,letterSpacing:1}},'⏸ PAUSE JOB')

        )

      // ── IMPORT MODAL ──
      showImportModal&&ce('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',zIndex:150,display:'flex',alignItems:'center',justifyContent:'center',padding:16}},
        ce('div',{style:{background:'#0d1117',border:'1px solid #2a3548',borderRadius:10,width:'100%',maxWidth:860,maxHeight:'90vh',overflow:'hidden',display:'flex',flexDirection:'column'}},
          ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 24px',borderBottom:'1px solid #1a2840',background:'#0a0e14'}},
            ce('div',null,ce('div',{style:{fontSize:18,fontWeight:700,color:'#7ec8f7',letterSpacing:2}},'⬆ IMPORT JOBS FROM EXCEL'),ce('div',{style:{fontSize:11,color:'#4a6fa5',letterSpacing:1,marginTop:3}},'Supports .xlsx · .xls · .csv — all columns are auto-detected')),
            ce('button',{className:'btn',onClick:()=>{ setShowImportModal(false); setImportPreview([]); setImportError(''); },style:{background:'none',color:'#4a6fa5',fontSize:22,padding:'0 6px'}},'✕')
          ),
          ce('div',{style:{padding:24,overflowY:'auto',flex:1}},
            !importPreview.length&&ce('div',{style:{textAlign:'center',padding:'24px 0'}},
              ce('input',{ref:importFileRef,type:'file',accept:'.xlsx,.xls,.csv',style:{display:'none'},onChange:handleImportFile}),
              ce('button',{className:'btn',onClick:()=>importFileRef.current?.click(),style:{background:'#1a2840',border:'2px dashed #2d7dd2',color:'#7ec8f7',padding:'20px 40px',fontSize:15,letterSpacing:2,borderRadius:8,display:'inline-flex',flexDirection:'column',alignItems:'center',gap:8}},
                ce('span',{style:{fontSize:32}},'📂'),ce('span',null,'CLICK TO SELECT FILE'),ce('span',{style:{fontSize:11,color:'#4a6fa5'}},'.xlsx · .xls · .csv')
              ),
              importLoading&&ce('div',{style:{marginTop:16,color:'#7ec8f7'}},'Reading file…'),
              importError&&ce('div',{style:{marginTop:16,color:'#ff8a80',fontSize:13}},'⚠ '+importError)

                ce('button',{className:'btn',onClick:()=>{ setImportPreview([]); setImportError(''); importFileRef.current&&(importFileRef.current.value=''); },style:{background:'#1a2840',border:'1px solid #2a3548',color:'#4a6fa5',padding:'6px 12px',fontSize:12}},'↩ CHOOSE DIFFERENT FILE')

                  ce('tbody',null,importPreview.map((row,i)=>{

                    return ce('tr',{key:i,style:{borderBottom:'1px solid #0d1520',background:i%2===0?'#0d1117':'#0b0f15'}},
                      ce('td',{style:{padding:'7px 10px',color:'#4a6fa5'}},i+1),
                      ce('td',{style:{padding:'7px 10px',color:'#d0d8e4',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},row.jobName||'—'),
                      ce('td',{style:{padding:'7px 10px',color:'#b0c0d4'}},row.client||'—'),

                      ce('td',{style:{padding:'7px 10px'}},row.foreman?ce('span',{style:{background:fc.bg,color:fc.text,border:`1px solid ${fc.border}`,borderRadius:3,padding:'1px 6px'}},row.foreman):ce('span',{style:{color:'#4a6fa5'}},'—')),
                      ce('td',{style:{padding:'7px 10px',color:'#b0c0d4',whiteSpace:'nowrap'}},row.startDate||'—'),
                      ce('td',{style:{padding:'7px 10px',color:'#d0d8e4'}},row.footage?Number(row.footage).toLocaleString()+' ft':'—'),
                      ce('td',{style:{padding:'7px 10px',color:'#7affa0'}},row.pricePerFoot?'$'+parseFloat(row.pricePerFoot).toFixed(2):'—'),
                      ce('td',{style:{padding:'7px 10px',color:'#b0c0d4',whiteSpace:'nowrap'}},[row.pipeSize,row.pipeSpec].filter(Boolean).join(' ')||'—'),
                      ce('td',{style:{padding:'7px 10px'}},ce('span',{style:{color:STATUS_COLORS[row.status]?.text||'#d0d8e4',fontWeight:600}},row.status)),
                      ce('td',{style:{padding:'7px 10px',color:'#4a6fa5',maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},row.notes||'—')

              ce('div',{style:{display:'flex',gap:12,justifyContent:'flex-end',marginTop:18}},
                ce('button',{className:'btn',onClick:()=>{ setShowImportModal(false); setImportPreview([]); setImportError(''); },style:{background:'#1a2840',border:'1px solid #2a3548',color:'#d0d8e4',padding:'10px 20px',fontSize:13,letterSpacing:1}},'CANCEL'),
                ce('button',{className:'btn',onClick:confirmImport,style:{background:'#2d7dd2',color:'#fff',padding:'10px 28px',fontSize:14,fontWeight:700,letterSpacing:1}},'✓ ADD '+importPreview.length+' JOB'+(importPreview.length!==1?'S':'')+' TO CALENDAR')
